    const chain = { name: p.name, rpc_url: p.rpcUrl, chain_id: p.chainId, anchor_address: p.anchorAddress || FAKE_CHAINS[0].anchor_address, explorer: p.explorer || null, native_token: p.nativeToken || null, builtin: false };
    _fakeCustomChains.push(chain);
    return { ok: true, data: chain };
  },
  async listRegistries() {
    await delay(150);
    return { ok: true, data: { registries: _fakeRegistries.map((n, i) => ({ id: i + 1, name: n, description: 'Simulated registry', creator: '0xSIMULATED', created_at: new Date().toISOString() })) } };
  },
  async createRegistry(p) {
    await delay(p.dryRun ? 150 : 400);
    if (!p.dryRun) _fakeRegistries.push(p.name);
    return { ok: true, data: { registry: p.name, broadcast: !p.dryRun, tx_hash: fakeTx() } };
  },
  async walletStatus() {
    await delay(150);
    if (!_fakeWalletKeySet) return { ok: false, error: 'no signing key configured' };
    return { ok: true, data: { address: '0xSIMULATED00000000000000000000000000000', balance_eth: '12.3', native_token: 'wmantraUSD', funded: true } };
  },
  async setWalletKey() { await delay(300); _fakeWalletKeySet = true; return { ok: true, data: { stored: true } }; },
  async removeWalletKey() { await delay(150); _fakeWalletKeySet = false; return { ok: true, data: { removed: true } }; },
  async resolveNode() {
    await delay(150);
    return { ok: true, data: { xpath: '/dg:chunk/…(simulated)', leaf_index: 0 } };
  },
  async stakeNode(p) {
    await delay(p.dryRun ? 200 : 600);
    return { ok: true, data: { chain: p.chain, registry: p.registry, tx_hash: fakeTx(), checksum: fakeTx(), broadcast: !p.dryRun, explorer_url: null, xpath: p.xpath } };
  },
  async stakeFile(p) {
    await delay(p.dryRun ? 200 : 600);
    return { ok: true, data: { chain: p.chain, registry: p.registry, tx_hash: fakeTx(), checksum: fakeTx(), broadcast: !p.dryRun, explorer_url: null } };
  },
  async proveNode() { await delay(300); return { ok: true, data: { valid: true } }; },
  async proveFile() { await delay(300); return { ok: true, data: { valid: true } }; },
};

const chainBackend = IS_SERVER ? realChainBackend : fakeChainBackend;

// ═══════════════════════════════════════════════════════════════════
// ANCHOR / CHAIN
// ═══════════════════════════════════════════════════════════════════

let anchorChain = null, anchorRegistry = null, anchorDgmlShown = false;
let anchorChains = [], anchorRegistries = [], anchorWallet = null;
// Distinguish "still loading" from "loaded and it's actually empty" — each
// `dgml` call the dialog makes is a fresh `uv run` subprocess (~3s cold
// start), so without this a first-open dialog looks broken, not busy.
let anchorChainsLoaded = false, anchorRegistriesLoaded = false;
let anchorConnectOpen = false, anchorCreateRegOpen = false, anchorKeyOpen = false;
// Draft values for the two inline forms, tracked outside the DOM so a
// re-render triggered by something else (e.g. the initial chain/registry/
// wallet load finishing in the background while the user is mid-typing)
// doesn't wipe out what they've typed — renderAnchorDialog() rebuilds the
// whole dialog body's innerHTML on every call, which would otherwise
// recreate blank <input> elements.
let anchorConnectDraft = { name: '', rpcUrl: '', chainId: '', anchorAddress: '' };
let anchorRegDraft = { name: '', description: '' };
let anchorRegDryRun = null; // {name, description} once previewed, awaiting confirm
let anchorPreviews = []; // [{tag, nodeId, xpath, leafIndex, error, staked, tx, explorerUrl}]
let anchorBusy = false, anchorLoadError = null;

function serializeXmlEl(el, indent) {
  const pad = '  '.repeat(indent);
  const tag = stripNs(el.tagName);
  if (el.children.length === 0) {
    const text = (el.textContent || '').trim();
    if (!text) return `${pad}<${tag}/>`;
    return `${pad}<${tag}>${text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</${tag}>`;
  }
  let out = `${pad}<${tag}>\n`;
  for (let i = 0; i < el.children.length; i++) out += serializeXmlEl(el.children[i], indent + 1) + '\n';
  return out + `${pad}</${tag}>`;
}

// App-internal nodeId is "r/i0/i1/..." (buildOverlaysByPage's root marker
// 'r' plus child indices) — the CLI's --child-path wants bare slash-separated
// indices only, so strip the 'r'. An id of exactly "r" (the root itself)
// becomes "" (--child-path's own convention for "the document root").
function nodeIdToChildPath(nodeId) {
  return nodeId.split('/').slice(1).join('/');
}

function elByNodeId(doc, nodeId) {
  const parts = nodeId.split('/');
  let el = doc.documentElement;
  for (let i = 1; i < parts.length; i++) {
    const idx = parseInt(parts[i], 10);
    if (!el || idx >= el.children.length) return null;
    el = el.children[idx];
  }
  return el;
}

function buildDgmlFragments() {
  if (!S.xmlStr) return '';
  const doc = new DOMParser().parseFromString(S.xmlStr, 'application/xml');
  // "Show DGML" previews whatever is currently selected -- it should track
  // your live selection, not stay frozen on the basket's contents.
  if (S.selNodeId) {
    const el = elByNodeId(doc, S.selNodeId);
    if (el) return serializeXmlEl(el, 0);
  }
  // Nothing currently selected: fall back to the basket, one fragment per
  // tag, preferring the exact instance captured when it was added.
  const parts = [];
  for (const entry of S.basket) {
    const el = (entry.nodeId && elByNodeId(doc, entry.nodeId))
      || [...doc.getElementsByTagName('*')].find(e => stripNs(e.tagName) === entry.tag);
    if (el) parts.push(serializeXmlEl(el, 0));
  }
  return parts.join('\n\n');
}

async function openAnchorDialog() {
  if (!S.basket.length) return;
  anchorDgmlShown = false; anchorConnectOpen = false; anchorCreateRegOpen = false; anchorKeyOpen = false;
  anchorRegDryRun = null; anchorLoadError = null;
  anchorChainsLoaded = false; anchorRegistriesLoaded = false; anchorWallet = null;
  anchorPreviews = S.basket.map(b => ({ tag: b.tag, nodeId: b.nodeId, xpath: null, leafIndex: null, error: null, staked: false, tx: null, explorerUrl: null }));
  document.getElementById('dlg-anchor').classList.remove('hidden');
  anchorBusy = true;
  renderAnchorDialog();
  await loadAnchorChains();
  anchorBusy = false;
  renderAnchorDialog();
}

async function loadAnchorChains() {
  const res = await chainBackend.listChains();
  anchorChainsLoaded = true;
  if (!res.ok) { anchorLoadError = res.error; anchorChains = []; return; }
  anchorChains = res.data.chains || [];
  if (!anchorChain || !anchorChains.some(c => c.name === anchorChain)) {
    // Default to testnet when available — this is a testing/sample app, and
    // defaulting to mainnet risks a real transaction against a real registry
    // on a genuinely live chain the first time the dialog opens.
    const testnet = anchorChains.find(c => c.name === 'nvnm-testnet');
    anchorChain = testnet ? testnet.name : (anchorChains.length ? anchorChains[0].name : null);
  }
  await loadAnchorRegistriesWalletAndPreviews();
}

async function loadAnchorRegistriesWalletAndPreviews() {
  if (!anchorChain) { anchorRegistries = []; anchorWallet = null; anchorRegistriesLoaded = true; return; }
  const [regRes, walletRes] = await Promise.all([
    chainBackend.listRegistries({ chain: anchorChain }),
    chainBackend.walletStatus({ chain: anchorChain }),
  ]);
  anchorRegistriesLoaded = true;
  anchorRegistries = regRes.ok ? (regRes.data.registries || []) : [];
  if (!anchorRegistry || !anchorRegistries.some(r => r.name === anchorRegistry)) {
    anchorRegistry = anchorRegistries.length ? anchorRegistries[0].name : null;
  }
  anchorWallet = walletRes;
  await resolveAnchorPreviews();
}

async function resolveAnchorPreviews() {
  for (const p of anchorPreviews) {
    if (p.xpath || p.error) continue; // node identity doesn't depend on chain/registry — resolve once
    const res = await chainBackend.resolveNode({ fileId: S.fileId, docsetId: S.docsetId, childPath: nodeIdToChildPath(p.nodeId) });
    if (res.ok) { p.xpath = res.data.xpath; p.leafIndex = res.data.leaf_index; }
    else { p.error = res.error; }
  }
}

async function onAnchorChainChange(name) {
  anchorChain = name; anchorRegistry = null;
  anchorRegistriesLoaded = false; anchorWallet = null;
  anchorBusy = true; renderAnchorDialog();
  await loadAnchorRegistriesWalletAndPreviews();
  anchorBusy = false; renderAnchorDialog();
}

async function submitConnectChain(fields) {
  anchorBusy = true; anchorLoadError = null; renderAnchorDialog();
  const res = await chainBackend.connectChain(fields);
  if (!res.ok) { anchorLoadError = res.error; anchorBusy = false; renderAnchorDialog(); return; }
  anchorConnectOpen = false;
  anchorChain = fields.name;
  await loadAnchorChains();
  anchorBusy = false;
  renderAnchorDialog();
}

async function submitCreateRegistry(fields) {
  anchorBusy = true; anchorLoadError = null; renderAnchorDialog();
  const dryRun = !anchorRegDryRun;
  const res = await chainBackend.createRegistry({ chain: anchorChain, name: fields.name, description: fields.description, dryRun });
  if (!res.ok) {
    anchorLoadError = res.error;
    // Keep the error visible — but if it failed because the name's already
    // taken, that registry does exist; look it up by name (bypasses
    // pagination) and add it to the dropdown so cancelling out of this form
    // leaves it there to pick manually, instead of a dead end.
    if (/already exists/i.test(res.error)) {
      const check = await chainBackend.listRegistries({ chain: anchorChain, name: fields.name });
      const found = check.ok ? (check.data.registries || []).find(r => r.name === fields.name) : null;
      if (found && !anchorRegistries.some(r => r.name === found.name)) {
        anchorRegistries = [found, ...anchorRegistries];
      }
    }
    anchorRegDryRun = null; anchorBusy = false; renderAnchorDialog(); return;
  }
  if (dryRun) {
    // First click just previews the unsigned tx; second click (below) broadcasts it —
    // registry creation is itself a signed, gas-costing transaction, same as staking.
    anchorRegDryRun = { name: fields.name, description: fields.description };
    anchorBusy = false; renderAnchorDialog(); return;
  }
  // Don't just trust the broadcast response — confirm the registry is
  // actually queryable by name before treating it as ready. A plain
  // unfiltered list wouldn't be conclusive either way (this testnet alone
  // has 1000+ registries and the list call only returns a default page),
  // so look it up by its exact name, which the chain resolves directly.
  const check = await chainBackend.listRegistries({ chain: anchorChain, name: fields.name });
  const confirmed = check.ok && (check.data.registries || []).some(r => r.name === fields.name);
  if (!confirmed) {
    anchorLoadError = `Registry "${fields.name}" was broadcast but a lookup by name doesn't find it yet — it may just need a moment to index. Try again shortly.`;
    anchorRegDryRun = null;
    anchorBusy = false;
    renderAnchorDialog();
    return;
  }
  anchorCreateRegOpen = false; anchorRegDryRun = null;
  anchorRegistry = fields.name;
  await loadAnchorRegistriesWalletAndPreviews();
  anchorBusy = false;
  renderAnchorDialog();
}

async function submitSetWalletKey(privateKey) {
  anchorBusy = true; anchorLoadError = null; renderAnchorDialog();
  const res = await chainBackend.setWalletKey({ privateKey });
  if (!res.ok) { anchorLoadError = res.error; anchorBusy = false; renderAnchorDialog(); return; }
  anchorKeyOpen = false;
  anchorWallet = await chainBackend.walletStatus({ chain: anchorChain });
  anchorBusy = false;
  renderAnchorDialog();
}

async function submitRemoveWalletKey() {
  anchorBusy = true; renderAnchorDialog();
  await chainBackend.removeWalletKey();
  anchorWallet = await chainBackend.walletStatus({ chain: anchorChain });
  anchorBusy = false;
  renderAnchorDialog();
}

async function confirmAnchor() {
  if (anchorBusy) return;
  const pending = anchorPreviews.filter(p => p.xpath && !p.staked);
  if (!pending.length) return;
  anchorBusy = true; renderAnchorDialog();
  for (const p of pending) {
    const res = await chainBackend.stakeNode({
      fileId: S.fileId, docsetId: S.docsetId, xpath: p.xpath,
      chain: anchorChain, registry: anchorRegistry, dryRun: false,
    });
    if (res.ok) {
      p.staked = true; p.tx = res.data.tx_hash; p.explorerUrl = res.data.explorer_url || null;
      S.anchorHistory.unshift({
        ts: new Date().toISOString(), fileId: S.fileId || '', tags: [p.tag],
        chain: anchorChain, tx: res.data.tx_hash, checksum: res.data.checksum, registry: anchorRegistry,
        xpath: p.xpath, explorerUrl: res.data.explorer_url || null,
      });
    } else {
      p.error = res.error;
    }
  }
  anchorBusy = false;
  renderAnchorDialog(); renderAnchorStrip();
}

function renderAnchorDialog() {
  // "+ Connect/Create" sentinels lead the list — with dozens of other
  // testers' registries on a shared public chain, an action tacked on at
  // the end of a long dropdown is effectively invisible.
  const chainOptions = `<option value="__connect__">+ Connect a chain…</option>`
    + anchorChains.map(c => `<option value="${esc(c.name)}"${c.name === anchorChain ? ' selected' : ''}>${esc(c.name)}</option>`).join('');
  // registry_list only returns a default-size page from the chain (this
  // testnet alone has 1000+ registries), so a just-created or otherwise
  // known registry can easily fall outside it — inject it as a real
  // <option> so the <select> doesn't silently fall back to showing
  // whatever else happens to render first.
  const knownRegNames = new Set(anchorRegistries.map(r => r.name));
  const currentRegOption = (anchorRegistry && !knownRegNames.has(anchorRegistry))
    ? `<option value="${esc(anchorRegistry)}" selected>${esc(anchorRegistry)}</option>` : '';
  const regOptions = `<option value="__create__">+ Create a registry…</option>`
    + currentRegOption
    + anchorRegistries.map(r => `<option value="${esc(r.name)}"${r.name === anchorRegistry ? ' selected' : ''}>${esc(r.name)}</option>`).join('');

  let walletHtml;
  if (anchorKeyOpen) {
    walletHtml = `<div class="form-row"><label class="form-label" style="font-size:12px">Wallet private key</label>
      <input class="form-input" type="password" id="anchor-key-input" placeholder="0x…" />
      <div style="margin-top:6px"><button class="btn btn-primary btn-sm" id="anchor-key-save">Save key</button>
      <button class="btn btn-secondary btn-sm" id="anchor-key-cancel">Cancel</button></div></div>`;
  } else if (anchorWallet === null) {
    walletHtml = `<div class="form-row" style="font-size:12px;color:#9ca3af">Checking wallet…</div>`;
  } else if (anchorWallet.ok) {
    const d = anchorWallet.data;
    const short = d.address.slice(0, 6) + '…' + d.address.slice(-4);
    walletHtml = `<div class="form-row" style="font-size:12px">Wallet ${esc(short)} · ${esc(d.balance_eth)} ${esc(d.native_token || '')}
      <button class="btn btn-secondary btn-sm" id="anchor-key-remove" style="margin-left:8px">Remove key</button></div>`;
  } else {
    walletHtml = `<div class="form-row" style="font-size:12px">No signing key configured.
      <button class="btn btn-secondary btn-sm" id="anchor-key-set">Set key</button></div>`;
  }

  let connectHtml = '';
  if (anchorConnectOpen) {
    connectHtml = `<div class="form-row">
      <input class="form-input" id="conn-name" placeholder="Chain name" style="margin-bottom:4px" value="${esc(anchorConnectDraft.name)}" />
      <input class="form-input" id="conn-rpc" placeholder="RPC URL" style="margin-bottom:4px" value="${esc(anchorConnectDraft.rpcUrl)}" />
      <input class="form-input" id="conn-chainid" placeholder="Chain ID" style="margin-bottom:4px" value="${esc(anchorConnectDraft.chainId)}" />
      <input class="form-input" id="conn-anchor" placeholder="Anchor address (optional)" style="margin-bottom:4px" value="${esc(anchorConnectDraft.anchorAddress)}" />
      <button class="btn btn-primary btn-sm" id="conn-submit">Connect</button>
      <button class="btn btn-secondary btn-sm" id="conn-cancel">Cancel</button>
    </div>`;
  }

  let regCreateHtml = '';
  if (anchorCreateRegOpen) {
    regCreateHtml = `<div class="form-row">
      <input class="form-input" id="reg-name" placeholder="Registry name" style="margin-bottom:4px" value="${esc(anchorRegDraft.name)}" />
      <input class="form-input" id="reg-desc" placeholder="Description" style="margin-bottom:4px" value="${esc(anchorRegDraft.description)}" />
      ${anchorRegDryRun ? '<div class="cli-notice">Unsigned transaction ready — confirm to broadcast.</div>' : ''}
      <button class="btn btn-primary btn-sm" id="reg-submit">${anchorRegDryRun ? 'Confirm & create' : 'Create'}</button>
      <button class="btn btn-secondary btn-sm" id="reg-cancel">Cancel</button>
    </div>`;
  }

  const previewRows = anchorPreviews.map(p => {
    let status;
    if (p.staked) status = `<span style="color:#16a34a">staked ✓ ${esc(p.tx.slice(0, 10))}…</span>`;
    else if (p.error) status = `<span style="color:#dc2626">${esc(p.error)}</span>`;
    else if (p.xpath) status = `<span style="color:#9ca3af">${esc(p.xpath)}</span>`;
    else status = '<span style="color:#9ca3af">resolving…</span>';
    return `<div class="form-row" style="font-size:11px;display:flex;gap:8px;align-items:baseline"><span class="tag-pill">${esc(p.tag)}</span>${status}</div>`;
  }).join('');

  const errorHtml = anchorLoadError ? `<div class="form-row" style="color:#dc2626;font-size:12px">${esc(anchorLoadError)}</div>` : '';
  const multiTxNotice = anchorPreviews.filter(p => !p.staked).length > 1
    ? `<div class="form-row" style="font-size:11px;color:#9ca3af">This submits ${anchorPreviews.filter(p => !p.staked).length} separate on-chain transactions, one per node.</div>` : '';

  document.getElementById('anchor-body').innerHTML = `
    <div class="form-row"><div class="section-lbl">Tags to anchor</div><div>${S.basket.map(b => `<span class="tag-pill">${esc(b.tag)}</span>`).join('')}</div></div>
    <div class="form-row">
      <label class="form-label" style="font-size:12px">Chain</label>
      ${!anchorChainsLoaded ? '<span style="font-size:12px;color:#9ca3af">Loading chains…</span>'
        : anchorConnectOpen ? '' : `<select class="sel-input" id="anchor-chain-sel" style="width:auto">${chainOptions}</select>`}
      ${connectHtml}
    </div>
    ${walletHtml}
    <div class="form-row">
      <label class="form-label" style="font-size:12px">Registry</label>
      ${!anchorRegistriesLoaded ? '<span style="font-size:12px;color:#9ca3af">Loading registries…</span>'
        : anchorCreateRegOpen ? '' : `<select class="sel-input" id="anchor-registry-sel" style="width:auto">${regOptions}</select>`}
      ${regCreateHtml}
    </div>
    ${errorHtml}
    <div class="form-row"><div class="section-lbl">Nodes</div>${previewRows}</div>
    ${multiTxNotice}
    <div class="form-row" style="margin-top:4px">
      <div style="display:flex;align-items:center;gap:8px">
        <button id="btn-dgml-toggle" class="btn btn-secondary btn-sm" style="font-size:11px;padding:3px 10px">${anchorDgmlShown ? 'Hide DGML ▴' : 'Show DGML ▸'}</button>
        <span style="font-size:11px;color:#9ca3af">XML fragments for selected tags</span>
      </div>
      <div id="dgml-fragment-wrap" style="display:${anchorDgmlShown ? 'block' : 'none'};margin-top:8px">
        <div class="code-green" style="max-height:280px;overflow-y:auto;white-space:pre">${anchorDgmlShown ? esc(buildDgmlFragments()) : ''}</div>
      </div>
    </div>`;

  const chainSel = document.getElementById('anchor-chain-sel');
  if (chainSel) chainSel.addEventListener('change', function () {
    if (this.value === '__connect__') {
      anchorConnectDraft = { name: '', rpcUrl: '', chainId: '', anchorAddress: '' };
      anchorConnectOpen = true; renderAnchorDialog(); return;
    }
    onAnchorChainChange(this.value);
  });
  const regSel = document.getElementById('anchor-registry-sel');
  if (regSel) regSel.addEventListener('change', function () {
    if (this.value === '__create__') {
      anchorRegDraft = { name: '', description: '' };
      anchorCreateRegOpen = true; renderAnchorDialog(); return;
    }
    anchorRegistry = this.value; renderAnchorDialog();
  });
  // Keep the draft in sync as the user types, so a re-render triggered by
  // something unrelated (background loads finishing) doesn't lose it.
  const connName = document.getElementById('conn-name');
  if (connName) connName.oninput = () => { anchorConnectDraft.name = connName.value; };
  const connRpc = document.getElementById('conn-rpc');
  if (connRpc) connRpc.oninput = () => { anchorConnectDraft.rpcUrl = connRpc.value; };
  const connChainId = document.getElementById('conn-chainid');
  if (connChainId) connChainId.oninput = () => { anchorConnectDraft.chainId = connChainId.value; };
  const connAnchor = document.getElementById('conn-anchor');
  if (connAnchor) connAnchor.oninput = () => { anchorConnectDraft.anchorAddress = connAnchor.value; };
  const connSubmit = document.getElementById('conn-submit');
  if (connSubmit) connSubmit.onclick = () => submitConnectChain({
    name: anchorConnectDraft.name.trim(),
    rpcUrl: anchorConnectDraft.rpcUrl.trim(),
    chainId: parseInt(anchorConnectDraft.chainId.trim(), 10),
    anchorAddress: anchorConnectDraft.anchorAddress.trim() || undefined,
  });
  const connCancel = document.getElementById('conn-cancel');
  if (connCancel) connCancel.onclick = () => { anchorConnectOpen = false; renderAnchorDialog(); };
  const regName = document.getElementById('reg-name');
  if (regName) regName.oninput = () => { anchorRegDraft.name = regName.value; };
  const regDesc = document.getElementById('reg-desc');
  if (regDesc) regDesc.oninput = () => { anchorRegDraft.description = regDesc.value; };
  const regSubmit = document.getElementById('reg-submit');
  if (regSubmit) regSubmit.onclick = () => submitCreateRegistry({
    name: anchorRegDraft.name.trim(),
    description: anchorRegDraft.description.trim(),
  });
  const regCancel = document.getElementById('reg-cancel');
  if (regCancel) regCancel.onclick = () => { anchorCreateRegOpen = false; anchorRegDryRun = null; renderAnchorDialog(); };
  const keySet = document.getElementById('anchor-key-set');
  if (keySet) keySet.onclick = () => { anchorKeyOpen = true; renderAnchorDialog(); };
  const keyRemove = document.getElementById('anchor-key-remove');
  if (keyRemove) keyRemove.onclick = submitRemoveWalletKey;
  const keySave = document.getElementById('anchor-key-save');
  if (keySave) keySave.onclick = () => submitSetWalletKey(document.getElementById('anchor-key-input').value);
  const keyCancel = document.getElementById('anchor-key-cancel');
  if (keyCancel) keyCancel.onclick = () => { anchorKeyOpen = false; renderAnchorDialog(); };
  document.getElementById('btn-dgml-toggle').addEventListener('click', () => {
    anchorDgmlShown = !anchorDgmlShown;
    const wrap = document.getElementById('dgml-fragment-wrap');
    const btn = document.getElementById('btn-dgml-toggle');
    if (anchorDgmlShown) {
      wrap.querySelector('.code-green').textContent = buildDgmlFragments();
      wrap.style.display = 'block';
      btn.textContent = 'Hide DGML ▴';
    } else {
      wrap.style.display = 'none';
      btn.textContent = 'Show DGML ▸';
    }
  });

  const pendingCount = anchorPreviews.filter(p => !p.staked).length;
  const allDone = anchorPreviews.length > 0 && pendingCount === 0;
  const ready = !anchorBusy && !allDone && anchorChain && anchorRegistry
    && anchorWallet && anchorWallet.ok && anchorWallet.data.funded
    && anchorPreviews.some(p => p.xpath && !p.staked);
  const confirmBtn = document.getElementById('anchor-confirm');
  confirmBtn.textContent = allDone ? 'Done ✓' : (pendingCount > 1 ? `Anchor ${pendingCount} nodes on Chain now ⚓` : 'Anchor on Chain now ⚓');
  confirmBtn.disabled = !ready;
}

async function openVerifyDialog(record) {
  document.getElementById('verify-body').innerHTML = `
    <div class="form-row"><div>${record.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('')} <span class="anc-chain">${esc(record.chain)}</span></div></div>
    <div class="form-row" style="font-size:11px;color:#9ca3af">${esc(record.tx)}</div>
    <div class="cli-notice">Verifying…</div>`;
  document.getElementById('dlg-verify').classList.remove('hidden');
  // checksum (the content hash, distinct from the tx hash) is what the chain
  // indexes records by — that's what `prove` needs to look one up.
  const res = record.xpath
    ? await chainBackend.proveNode({ chain: record.chain, registry: record.registry, checksum: record.checksum })
    : await chainBackend.proveFile({ chain: record.chain, registry: record.registry, checksum: record.checksum });
  const verdict = res.ok
    ? (res.data.valid ? '<div class="cli-confirmed">Verified ✓ — this anchor still holds.</div>' : '<div style="color:#dc2626">Verification failed — this record no longer matches on-chain state.</div>')
    : `<div style="color:#dc2626">${esc(res.error)}</div>`;
  document.getElementById('verify-body').innerHTML = `
    <div class="form-row"><div>${record.tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('')} <span class="anc-chain">${esc(record.chain)}</span></div></div>
    <div class="form-row" style="font-size:11px;color:#9ca3af">${esc(record.tx)}</div>
    ${verdict}`;
}

const SB_FILE_ICON = '<svg width="12" height="12" viewBox="0 0 12 14" fill="currentColor" style="opacity:.5;flex-shrink:0"><path d="M2 0a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4.5L7.5 0H2zm5 1v3.5H10L7 1z"/></svg>';
const sidebarCollapsed = new Set();

function renderSidebar() {
  const navEl = document.getElementById('sidebar');
  const rh = document.getElementById('resize-handle');
  navEl.classList.toggle('hidden', !S.wsHandle);
  rh.classList.toggle('hidden', !S.wsHandle);
  const el = document.getElementById('sidebar-inner');
  if (!S.wsHandle || !S.wsIndex) { el.innerHTML = ''; return; }
  const { docsets, files } = S.wsIndex;
  const fileById = new Map(files.map(f => [f.id, f]));
  const inDocset = new Set(docsets.flatMap(ds => ds.fileIds));

  let h = `<div class="sb-section-lbl">Docsets (${docsets.length})</div>`;
  if (!docsets.length) h += '<div style="padding:4px 12px;font-size:12px;color:#9ca3af;font-style:italic">No docsets</div>';
  for (const ds of docsets) {
    const open = !sidebarCollapsed.has(ds.id);
    h += `<div class="sb-ds-group">
      <div class="sb-ds-hdr">
        <span class="sb-ds-toggle${open ? ' open' : ''}" data-toggle-ds="${esc(ds.id)}">›</span>
        <span class="sb-ds-name" data-nav-ds="${esc(ds.id)}" title="${esc(ds.name ?? ds.id)}">${esc(ds.name ?? ds.id)}</span>
      </div>`;
    if (open) {
      h += '<ul style="list-style:none;margin:0;padding:0">';
      for (const fid of ds.fileIds) {
        const f = fileById.get(fid) || { id: fid, filename: fid, pageCount: 0 };
        const active = S.routeParams.fileId === fid && S.routeParams.docsetId === ds.id;
        h += `<li><div class="sb-file${active ? ' active' : ''}" style="padding-left:2.25rem" data-nav-file="${esc(fid)}" data-nav-ds-for-file="${esc(ds.id)}" title="${esc(f.filename)}">
          ${SB_FILE_ICON}<span class="name">${esc(f.filename)}</span></div></li>`;
      }
      h += '</ul>';
    }
    h += '</div>';
  }

  const looseFiles = files.filter(f => !inDocset.has(f.id));
  if (looseFiles.length) {
    h += `<div class="sb-section-lbl">Unassigned (${looseFiles.length})</div><ul style="list-style:none;margin:0;padding:0 0 8px">`;
    for (const f of looseFiles) {
      const active = S.routeParams.fileId === f.id && !S.routeParams.docsetId;
      h += `<li><div class="sb-file${active ? ' active' : ''}" style="padding-left:1.5rem" data-nav-file="${esc(f.id)}" title="${esc(f.filename)}">
        ${SB_FILE_ICON}<span class="name">${esc(f.filename)}</span></div></li>`;
    }
    h += '</ul>';
  }

  el.innerHTML = h;
  el.querySelectorAll('[data-toggle-ds]').forEach(e => e.addEventListener('click', ev => {
    ev.stopPropagation();
    const id = e.dataset.toggleDs;
    if (sidebarCollapsed.has(id)) sidebarCollapsed.delete(id); else sidebarCollapsed.add(id);
    renderSidebar();
  }));
  el.querySelectorAll('[data-nav-ds]').forEach(e => e.addEventListener('click', () => {
    const ds = S.wsIndex.docsets.find(d => d.id === e.dataset.navDs);
    if (ds?.fileIds.length) nav(`/docsets/${ds.id}/files/${ds.fileIds[0]}`, { docsetId: ds.id, fileId: ds.fileIds[0] });
  }));
  el.querySelectorAll('[data-nav-file]').forEach(e => e.addEventListener('click', () => {
    const dsId = e.dataset.navDsForFile;
    if (dsId) nav(`/docsets/${dsId}/files/${e.dataset.navFile}`, { docsetId: dsId, fileId: e.dataset.navFile });
    else nav(`/files/${e.dataset.navFile}`, { fileId: e.dataset.navFile });
  }));
}

    <div class="fv-wrap">

            <div class="tdp-filters" id="tdp-filters"></div>
            <div class="tdp-search-wrap">
              <input class="tdp-search" id="tdp-search" placeholder="Filter tags / Describe tags…" />
              <span class="tdp-search-ico" id="tdp-search-ico"></span>
            </div>
            <div class="tdp-chips" id="tdp-chips"></div>

  initRightColResize();

  searchInp.addEventListener('input', e => {
    S.tagSearch = e.target.value; S.describeResults = null;
    S.describeLoading = !!S.tagSearch.trim() && !!S.llm.apiKey;
    refreshTagChips();
    clearTimeout(_descDebounce);
    if (S.tagSearch.trim().length > 2 && S.llm.apiKey) {
      _descDebounce = setTimeout(() => runDescribeSearch(S.tagSearch), 500);
    } else { S.describeLoading = false; }
  });

  // Load content (async — don't await here)
  loadFileContent(fileId, docsetId, fileInfo.pageCount);

async function loadFileContent(fileId, docsetId, pageCount) {
  try {
    // Load XML
    let xmlStr = null;
    if (docsetId && S.wsHandle) {
      try { xmlStr = await findXml(S.wsHandle, docsetId, fileId); } catch {}
    }
    S.xmlStr = xmlStr;
    S.overlaysByPage = xmlStr ? buildOverlaysByPage(xmlStr) : new Map();
    _metrics = xmlStr ? computeTagMetrics(xmlStr) : [];
    _computedMap = xmlStr ? buildComputedIndex(xmlStr) : new Map();

    refreshFilterBtns();
    refreshTagChips();
    renderTreePanel();
    renderAnchorStrip();
    renderOverlay();

    if (xmlStr && _metrics.length) runSemanticClassification(); // background, no await
  } catch (e) {
    console.error('loadFileContent error:', e);
    S.xmlStr = null; S.overlaysByPage = new Map(); _metrics = []; _computedMap = new Map();
    refreshFilterBtns(); refreshTagChips(); renderTreePanel(); renderAnchorStrip();
  }

  // Load page images
  try { await loadPageImages(fileId, pageCount); } catch (e) { console.error('loadPageImages error:', e); }
}

async function loadPageImages(fileId, pageCount) {
  const col = document.getElementById('fv-page-col');
  if (!col) return;

  let count = pageCount;
  if (!count && S.wsHandle) {
    const dir = await getDirHandle(S.wsHandle, 'files', fileId, 'page_images');
    if (dir) count = (await listFileNames(dir)).filter(n => /\.(png|jpe?g)$/i.test(n)).length;
  }
  if (!count) { col.innerHTML = '<div style="color:#9ca3af;padding:40px;font-size:13px;text-align:center">No page images found for this file.</div>'; return; }

  S.pageCount = count;
  if (S.currentPage > count) S.currentPage = 1;

  // Build stage: wrap > img + svg (SVG absolutely positioned over img)
  col.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'page-stage-wrap';
  wrap.id = 'pg-wrap';

  const img = document.createElement('img');
  img.id = 'pg-img';
  img.alt = 'Page';
  img.addEventListener('error', () => { img.style.display = 'none'; });

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'pg-svg';
  // viewBox 0 0 100 100 — rect coords are percent-of-page (pixel rects converted at render time)
  svg.setAttribute('viewBox', '0 0 100 100');
  svg.setAttribute('preserveAspectRatio', 'none');

  wrap.appendChild(img);
  wrap.appendChild(svg);
  col.appendChild(wrap);

  updateNavBar();
  updateZoom();        // sets wrap width so img.offsetWidth is valid when onload fires
  loadCurrentPageImage();
}

function loadCurrentPageImage() {
  const img = document.getElementById('pg-img');
  const svg = document.getElementById('pg-svg');
  if (!img) return;
  svg && (svg.innerHTML = ''); // clear stale overlay; redraw for new page immediately
  renderOverlay();
  if (S.wsHandle && S.fileId) {
    getPageBlobUrl(S.wsHandle, S.fileId, S.currentPage).then(url => {
      const img2 = document.getElementById('pg-img');
      if (!img2) return;
      if (url) { img2.style.display = ''; img2.src = url; img2.onload = renderOverlay; }
      else { img2.style.display = 'none'; }
    });
  }
}

function showPage() {
  updateNavBar();
  updateZoom();
  loadCurrentPageImage();
}

function updateNavBar() {
  const el = document.getElementById('nav-count');
  if (el) el.textContent = `${S.currentPage} / ${S.pageCount || '?'}`;
  const prev = document.getElementById('nav-prev');
  const next = document.getElementById('nav-next');
  if (prev) prev.disabled = S.currentPage <= 1;
  if (next) next.disabled = S.currentPage >= S.pageCount;
}

function updateZoom() {
  const lbl = document.getElementById('zoom-lbl');
  if (lbl) lbl.textContent = S.zoomPct + '%';
  const wrap = document.getElementById('pg-wrap');
  if (wrap) {
    // Base width 860px × zoom factor
    wrap.style.width = Math.round(860 * S.zoomPct / 100) + 'px';
  }
  // With viewBox 0 0 100 100 the SVG scales via CSS — no re-render needed on zoom.
}

// ═══════════════════════════════════════════════════════════════════
// TAG PANEL
// ═══════════════════════════════════════════════════════════════════
function refreshFilterBtns() {
  const el = document.getElementById('tdp-filters');
  if (!el) return;
  const mkBtn = (label, isSem) => {
    const active = S.tagFilter === label;
    let cls = 'tdp-btn' + (active ? ' active' : '');
    if (!active && isSem) cls += S.semanticLoading ? ' sem loading' : !S.llm.apiKey ? ' sem no-key' : ' sem';
    return `<button class="${cls}" data-f="${esc(label)}">${esc(label)}</button>`;
  };
  el.innerHTML = mkBtn('All', false) + SEMANTIC_FILTERS.map(f => mkBtn(f, true)).join('') + ALGO_FILTERS.map(f => mkBtn(f, false)).join('');
  el.querySelectorAll('[data-f]').forEach(btn => btn.addEventListener('click', () => {
    const label = btn.dataset.f;
    if (SEMANTIC_FILTERS.includes(label)) {
      if (!S.llm.apiKey) { toast('This filter needs an LLM API key — set one in LLM Settings.', 'error'); return; }
      if (S.semanticLoading) { toast('Still classifying tags — try again in a moment.', 'error'); return; }
      if (S.semanticError) { toast('Tag classification failed: ' + S.semanticError, 'error'); return; }
    }
    S.tagFilter = label; refreshFilterBtns(); refreshTagChips();
  }));
}

function refreshTagChips() {
  const chipsEl = document.getElementById('tdp-chips');
  const icoEl = document.getElementById('tdp-search-ico');
  if (!chipsEl) return;
  if (icoEl) icoEl.textContent = S.describeLoading ? '⟳' : S.describeResults !== null ? '✦' : '';

  const filtered = getFilteredMetrics();
  if (!filtered.length) {
    chipsEl.innerHTML = `<span class="tdp-empty">${_metrics.length ? 'No tags match.' : 'No DGML loaded.'}</span>`;
    return;
  }
  chipsEl.innerHTML = filtered.map(m => {
    const sel = S.selTag === m.name, hov = S.hovTag === m.name;
    return `<span class="chip${sel ? ' sel' : ''}${hov ? ' hov' : ''}" data-tag="${esc(m.name)}">${esc(m.name)}<span class="chip-cnt">${m.count}</span></span>`;
  }).join('');
  chipsEl.querySelectorAll('[data-tag]').forEach(chip => {
    const tag = chip.dataset.tag;
    // Hover must NOT rebuild the chip list (refreshTagChips() replaces every
    // chip, including the one under the pointer) — same click-drop hazard as
    // the SVG overlay. Toggle classes on the existing elements instead.
    chip.addEventListener('mouseenter', () => { S.hovTag = tag; updateChipStyles(); renderAnchorStrip(); updateOverlayStyles(); });
    chip.addEventListener('mouseleave', () => { S.hovTag = null; updateChipStyles(); renderAnchorStrip(); updateOverlayStyles(); });
    chip.addEventListener('click', () => {
      S.selTag = S.selTag === tag ? null : tag;  // toggle selTag only, never touch selNodeId
      refreshTagChips(); renderTreePanel(); renderAnchorStrip(); renderOverlay();
    });
  });
}

function updateChipStyles() {
  document.querySelectorAll('#tdp-chips [data-tag]').forEach(chip => {
    const tag = chip.dataset.tag;
    chip.classList.toggle('sel', S.selTag === tag);
    chip.classList.toggle('hov', S.hovTag === tag);
  });
}

// ═══════════════════════════════════════════════════════════════════
// TREE PANEL
// ═══════════════════════════════════════════════════════════════════
const PREVIEW_MAX = 80;

function buildTreeNodes(el, id) {
  const children = [];
  for (let i = 0; i < el.children.length; i++) children.push(buildTreeNodes(el.children[i], `${id}/${i}`));
  const text = (el.textContent || '').replace(/\s+/g, ' ').trim();
  const preview = text.length > PREVIEW_MAX ? text.slice(0, PREVIEW_MAX - 1) + '…' : text;
  const originAttr = (el.getAttributeNS(DG_NS, 'origin') ?? el.getAttribute('dg:origin') ?? '').trim();
  // dg:origin="computed" is a marker string, not a box — it has no page location
  // of its own (see buildComputedIndex).
  const isComputed = originAttr === 'computed';
  const hasBoxes = !!originAttr && !isComputed;
  // The one <dg:extraction> element (schema-driven field values, sibling of
  // the generated document tree) — marked so it doesn't blend into the rest
  // of the tree at a glance.
  const isExtraction = el.tagName === 'dg:extraction';
  return { id, tag: el.tagName, preview, hasBoxes, isComputed, isExtraction, children };
}

function defaultTreeExpanded(node, depth) {
  if (depth < 2) {
    treeExpanded.add(node.id);
    for (const c of node.children) defaultTreeExpanded(c, depth + 1);
  }
}

// Node ids are '/'-joined paths (e.g. "r/0/2/0"), so ancestors are just its
// prefixes. Selecting a node from outside the tree (a page-image click, a
// tag chip) must expand its whole ancestor chain — otherwise a node past
// the default depth-2 expansion is selected in state but invisible, and a
// click looks like it did nothing even though it worked.
function expandAncestorsOf(nodeId) {
  if (!nodeId) return;
  const parts = nodeId.split('/');
  let path = parts[0];
  treeExpanded.add(path);
  for (let i = 1; i < parts.length; i++) {
    path += '/' + parts[i];
    treeExpanded.add(path);
  }
}

function renderTreePanel() {
  const scroll = document.getElementById('tree-scroll');
  if (!scroll) return;
  if (!S.xmlStr) { scroll.innerHTML = '<div class="tree-placeholder">No DGML file found for this document.</div>'; return; }
  const doc = new DOMParser().parseFromString(S.xmlStr, 'application/xml');
  if (doc.querySelector('parsererror')) { scroll.innerHTML = '<div class="tree-placeholder">XML parse error.</div>'; return; }
  const root = buildTreeNodes(doc.documentElement, 'r');
  // On first render of this file set default expansion (depth 0 + 1)
  if (treeExpanded.size === 0) defaultTreeExpanded(root, 0);
  scroll.innerHTML = renderTreeNode(root, 0);
  scroll.querySelectorAll('[data-toggle]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const id = btn.dataset.toggle;
    if (treeExpanded.has(id)) treeExpanded.delete(id); else treeExpanded.add(id);
    renderTreePanel();
  }));
  scroll.querySelectorAll('[data-tree-tag]').forEach(btn => {
    const tag = btn.dataset.treeTag;
    const nid = btn.dataset.treeId || null;
    const hasBoxes = !!btn.dataset.hasBoxes;
    const isComputed = !!btn.dataset.computed;
    btn.addEventListener('pointerenter', () => {
      S.hovNodeId = nid; S.hovTag = tag;
      refreshTagChips(); renderAnchorStrip(); renderOverlay();
    });
    btn.addEventListener('pointerleave', () => {
      S.hovNodeId = null; S.hovTag = null;
      refreshTagChips(); renderAnchorStrip(); renderOverlay();
    });
    btn.addEventListener('click', () => {
      // Always set selTag (React: always dispatch setSelectedTagName)
      S.selTag = tag;
      // Toggle selNodeId regardless of hasBoxes — a tree click always
      // identifies one concrete node (buildTreeNodes gives every node an
      // id), whether or not it has a page bounding box to scroll to. Boxes
      // only gate the scroll/jump side effect below, not the selection
      // itself — anchoring a node doesn't require it to be visible on a
      // page image.
      S.selNodeId = S.selNodeId === nid ? null : nid;
      if (hasBoxes) {
        const onCurrentPage = (S.overlaysByPage.get(S.currentPage) || []).some(r => r.nodeId === nid);
        if (onCurrentPage) {
          // scroll the rect into view (React: requestScrollToDgmlNode)
          const svgRect = document.querySelector(`[data-nid="${CSS.escape(nid)}"]`);
          svgRect?.scrollIntoView({ block: 'nearest' });
        } else {
          jumpToPage(nearestPageForNodeId(nid));
        }
      } else if (isComputed && S.selNodeId === nid) {
        // A computed value has no box of its own to jump to — jump to
        // wherever its first source field lives instead; renderOverlay()
        // highlights all of its sources once selNodeId is set.
        const info = _computedMap.get(nid);
        const firstTarget = info?.hrefTargets[0];
        if (firstTarget) jumpToPage(nearestPageForNodeId(firstTarget));
      }
      refreshTagChips(); renderTreePanel(); renderAnchorStrip(); renderOverlay();
    });
  });
}

function renderTreeNode(node, depth) {
  const tag = stripNs(node.tag);
  const hasKids = node.children.length > 0;
  const expanded = treeExpanded.has(node.id);
  const isSel = (!!S.selNodeId && node.id === S.selNodeId) || (!!S.selTag && tag === S.selTag);
  const isHov = !isSel && ((!!S.hovNodeId && node.id === S.hovNodeId) || (!!S.hovTag && tag === S.hovTag));
  const indent = depth * 12;
  let btnCls = 'tree-node-btn';
  if (isSel) btnCls += ' tag-sel';
  else if (isHov) btnCls += ' tag-hov';
  // Computed nodes have no box of their own but ARE clickable (they jump to
  // their source fields instead) — only true boxless/unrooted nodes get the
  // "not actionable" cursor.
  if (!node.hasBoxes && !node.isComputed) btnCls += ' no-boxes';
  if (node.isComputed) btnCls += ' computed';
  let h = `<div class="tree-node-wrap"><div class="tree-node-row" style="padding-left:${indent}px">`;
  h += hasKids
    ? `<span class="tree-toggle" data-toggle="${esc(node.id)}">${expanded ? '▾' : '▸'}</span>`
    : `<span class="tree-toggle invisible">▸</span>`;
  h += `<button class="${btnCls}" data-tree-tag="${esc(tag)}" data-tree-id="${esc(node.id)}" data-has-boxes="${node.hasBoxes ? '1' : ''}" data-computed="${node.isComputed ? '1' : ''}">`;
  h += `<span class="tree-tag">${esc(tag)}</span>`;
  if (node.isComputed) {
    const info = _computedMap.get(node.id);
    const title = info && info.hrefTags.length ? `Computed from: ${info.hrefTags.join(', ')}` : 'Computed value — source fields not resolved';
    h += `<span class="computed-badge" title="${esc(title)}">Σ computed</span>`;
  }
  if (node.isExtraction) h += `<span class="extraction-badge" title="Schema-driven extracted field values">extraction</span>`;
  if (node.preview) h += `<span class="tree-preview">${esc(node.preview)}</span>`;
  h += `</button></div>`;
  if (hasKids && expanded) {
    for (const child of node.children) h += renderTreeNode(child, depth + 1);
  }
  return h + '</div>';
}

// ═══════════════════════════════════════════════════════════════════
// ANCHOR STRIP
// ═══════════════════════════════════════════════════════════════════
function renderAnchorStrip() {
  const area = document.getElementById('anchor-area');
  if (!area) return;
  const fileId = S.fileId;
  const canAdd = !!S.selTag && !S.basket.some(b => b.tag === S.selTag);
  const hasInstance = !!S.selNodeId;
  const history = fileId ? S.anchorHistory.filter(r => r.fileId === fileId) : [];

  let h = `<div class="anchor-strip">
    <span class="anchor-label">Anchor on Chain</span>
    <div class="anchor-basket">`;
  if (!S.basket.length) {
    h += '<span class="basket-empty">empty</span>';
  } else {
    for (const entry of S.basket) {
      const sel = S.selTag === entry.tag, hov = !sel && S.hovTag === entry.tag;
      h += `<span class="basket-tag${sel ? ' sel' : ''}${hov ? ' hov' : ''}" data-bt="${esc(entry.tag)}" data-bt-nid="${esc(entry.nodeId || '')}">${esc(entry.tag)}<button class="basket-rm" data-rm="${esc(entry.tag)}" title="Remove">×</button></span>`;
    }
  }
  h += '</div>';
  if (canAdd) h += `<button class="anchor-add-btn" id="btn-basket-add"${hasInstance ? '' : ' disabled title="Click an occurrence in the tree first"'}>+ ${esc(S.selTag)}</button>`;
  if (S.basket.length) h += `<button class="anchor-now-btn" id="btn-anchor-now">Anchor on Chain now ⚓</button>`;
  h += '</div>';

  if (history.length) {
    h += `<div class="anchor-history"><div class="anchor-history-hdr">Anchored records</div>`;
    for (let i = 0; i < history.length; i++) {
      const r = history[i];
      const shortTx = r.tx.slice(0, 10) + '…' + r.tx.slice(-6);
      h += `<div class="anchor-rec"><span class="anc-ts">${new Date(r.ts).toLocaleString()}</span><span class="anc-chain">${esc(r.chain)}</span><span class="anc-tags">${esc(r.tags.join(', '))}</span><span class="anc-tx">${esc(shortTx)}</span><button class="anc-verify" data-vi="${i}">Verify ↗</button></div>`;
    }
    h += '</div>';
  }

  area.innerHTML = h;

  area.querySelectorAll('[data-bt]').forEach(el => el.addEventListener('click', e => {
    if (e.target.dataset.rm) return;
    if (S.selTag === el.dataset.bt) {
      S.selTag = null; // toggle off
    } else {
      // Re-select exactly the instance this basket entry was added from.
      S.selTag = el.dataset.bt;
      S.selNodeId = el.dataset.btNid || null;
    }
    refreshTagChips(); renderTreePanel(); renderAnchorStrip(); renderOverlay();
  }));
  area.querySelectorAll('[data-rm]').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation(); S.basket = S.basket.filter(b => b.tag !== btn.dataset.rm); renderAnchorStrip();
  }));
  const addBtn = area.querySelector('#btn-basket-add');
  if (addBtn) addBtn.onclick = () => {
    if (S.selTag && S.selNodeId && !S.basket.some(b => b.tag === S.selTag)) {
      // Only reachable with a concrete selNodeId (the button is disabled
      // otherwise) — every basket entry names one exact instance, never an
      // arbitrary first-in-document match of the tag name.
      S.basket = [...S.basket, { tag: S.selTag, nodeId: S.selNodeId }];
      renderAnchorStrip();
    }
  };
  const nowBtn = area.querySelector('#btn-anchor-now');
  if (nowBtn) nowBtn.onclick = openAnchorDialog;
  area.querySelectorAll('[data-vi]').forEach(btn => btn.addEventListener('click', () => openVerifyDialog(history[+btn.dataset.vi])));
}

async function runServerPipeline(areaId, endpoint, body, btnId, idleLabel, gateStep) {
  if (S.pipelineRunning) return;
  S.pipelineRunning = true;
  if (body.workspaceDir) S.lastWorkspaceDir = body.workspaceDir;
  const area = document.getElementById(areaId);
  if (!area) { S.pipelineRunning = false; return; }

  const btn = document.getElementById(btnId);
  const startOnclick = btn ? btn.onclick : null;
  function toSuspend() {
    if (!btn) return;
    btn.textContent = 'Suspend';
    // Cancelling mid-`add` leaves un-added source files that only "Run
    // pipeline" (not "Resume") will pick up, so don't offer Suspend until
    // `add` (when present) has finished.
    btn.disabled = !!gateStep;
    btn.onclick = async () => {
      try { await fetch('/pipeline/cancel', { method: 'POST' }); }
      catch (e) { toast('Failed to suspend: ' + e.message, 'error'); }
    };
  }
  function toIdle() {
    if (!btn) return;
    btn.textContent = idleLabel;
    btn.disabled = false;
    btn.onclick = startOnclick;
  }
  function toResume() {
    if (!btn) return;
    // Suspend is only reachable once `add` (when present) is already done,
    // so resuming never needs to re-run it — go straight to cluster+generate
    // on the same workspace, same as the Resume tab.
    btn.textContent = 'Resume';
    btn.disabled = false;
    btn.onclick = () => runServerPipeline(
      areaId, '/pipeline/resume',
      { workspaceDir: body.workspaceDir, model: S.llm.model, apiKey: S.llm.apiKey },
      btnId, idleLabel, null
    );
  }
  toSuspend();

  const stepState = {};
  const logs = [];
  function draw() {
    const stepsHtml = Object.entries(stepState).map(([name, status]) => {
      const ico = status === 'running' ? '<div class="step-ico running">↻</div>' : status === 'done' ? '<div class="step-ico done">✓</div>' : '<div class="step-ico error">✗</div>';
      return `<div class="step-item">${ico}<span>${esc(name)}</span></div>`;
    }).join('');
    area.innerHTML = `<div class="step-list" style="margin-bottom:12px">${stepsHtml}</div><div class="log-box">${logs.map(l => `<div>${esc(l)}</div>`).join('')}</div>`;
    const lb = area.querySelector('.log-box'); if (lb) lb.scrollTop = lb.scrollHeight;
  }
  draw();

  try {
    const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (!res.ok) { const e = await res.json(); toast(e.error || 'Pipeline failed to start', 'error'); S.pipelineRunning = false; toIdle(); return; }
  } catch (e) { toast('Cannot reach server: ' + e.message, 'error'); S.pipelineRunning = false; toIdle(); return; }

  const es = new EventSource('/pipeline/events');
  es.onmessage = e => {
    const ev = JSON.parse(e.data);
    if (ev.type === 'step') {
      stepState[ev.name] = ev.status; draw();
      if (btn && gateStep && ev.name === gateStep && (ev.status === 'done' || ev.status === 'error')) {
        btn.disabled = false;
      }
    }
    else if (ev.type === 'log') { logs.push(ev.text); draw(); }
    else if (ev.type === 'done') {
      logs.push('Pipeline complete!'); draw();
      es.close(); S.pipelineRunning = false; toIdle();
      // Switch workspace to the completed one and navigate home
      const wsDir = ev.workspaceDir;
      if (wsDir) {
        S.wsHandle = 'server'; S.wsName = wsDir.split(/[\\/]/).pop() || wsDir; S.wsPath = wsDir;
        refreshWorkspace(true);
      }
    } else if (ev.type === 'error') {
      logs.push('Error: ' + ev.message); draw();
      es.close(); S.pipelineRunning = false; toIdle();
    } else if (ev.type === 'cancelled') {
      logs.push('Suspended. Click Resume to continue.'); draw();
      es.close(); S.pipelineRunning = false; toResume();
    }
  };
  es.onerror = () => { logs.push('Connection to server lost.'); draw(); es.close(); S.pipelineRunning = false; toIdle(); };
}

async function runFakePipeline(areaId) {
  if (S.pipelineRunning) return;
  S.pipelineRunning = true;
  const area = document.getElementById(areaId);
  if (!area) { S.pipelineRunning = false; return; }
  const steps = PIPELINE_STEPS.map(() => 'pending');
  const logs = [];
  function draw() {
    area.innerHTML = `<div class="step-list" style="margin-bottom:12px">${steps.map((s, i) => {
      const ico = s === 'running' ? '<div class="step-ico running">↻</div>' : s === 'done' ? '<div class="step-ico done">✓</div>' : '<div class="step-ico pending">○</div>';
      return `<div class="step-item">${ico}<span>${PIPELINE_STEPS[i]}</span></div>`;
    }).join('')}</div><div class="log-box">${logs.map(l => `<div>${esc(l)}</div>`).join('')}</div>`;
    const lb = area.querySelector('.log-box'); if (lb) lb.scrollTop = lb.scrollHeight;
  }
  draw();
  for (let i = 0; i < PIPELINE_STEPS.length; i++) {
    steps[i] = 'running'; draw();
    for (const line of FAKE_OUTPUT[i]) { logs.push(line); draw(); await delay(280 + Math.random() * 350); }
    steps[i] = 'done'; draw(); await delay(180);
  }
  logs.push('Pipeline complete! Open your workspace folder to explore the results.'); draw();
  S.pipelineRunning = false;
}

// WORKSPACE
// ═══════════════════════════════════════════════════════════════════
async function openWorkspace() {
  if (IS_SERVER) {
    try {
      const { path } = await fetch('/api/pick-dir', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ startPath: S.wsPath || null }) }).then(r => r.json());
      if (!path) return; // user cancelled
      await fetch('/workspace/switch', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ root: path }) });
      S.wsHandle = 'server'; S.wsName = path.split(/[\\/]/).pop() || path; S.wsPath = path;
      await refreshWorkspace(true);
    } catch (e) { toast('Failed to open workspace: ' + e.message, 'error'); }
    return;
  }
  if (!window.showDirectoryPicker) { toast('File System Access API not supported. Use Chrome or Edge.', 'error'); return; }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'read' });
    WORKSPACE_READ_BASE = null; // leaving a bundled sample (if any) for a real local folder
    S.wsHandle = handle; S.wsName = handle.name; S.wsPath = '';
    await refreshWorkspace(true);
  } catch (e) { if (e.name !== 'AbortError') toast('Failed to open workspace: ' + e.message, 'error'); }
}

// Switch to one of the bundled sample workspaces discovered in
// samples/file-list.json (see the "STATIC SAMPLE BUNDLE" section above).
async function selectStaticSample(sample) {
  WORKSPACE_READ_BASE = sample.base;
  S.wsHandle = 'static'; S.wsName = sample.name; S.wsPath = sample.base;
  await refreshWorkspace(true);
}

async function refreshWorkspace(initial = false) {
  if (!S.wsHandle) return;
  const ico = document.getElementById('refresh-ico');
  if (ico) ico.style.animation = 'spin .6s linear infinite';
  try {
    S.wsIndex = await buildIndex(S.wsHandle);
    if (initial) {
      const { docsets, files } = S.wsIndex;
      if (!files.length && !docsets.length) nav('/setup');
      else if (docsets.length && docsets[0].fileIds.length) nav(`/docsets/${docsets[0].id}/files/${docsets[0].fileIds[0]}`, { docsetId: docsets[0].id, fileId: docsets[0].fileIds[0] });
      else nav('/');
    } else render();
  } catch (e) { toast('Error reading workspace: ' + e.message, 'error'); }
  finally { if (ico) ico.style.animation = ''; }
}

function initSidebarResize() {
  const handle = document.getElementById('resize-handle');
  const sb = document.getElementById('sidebar');
  let drag = false, sx = 0, sw = 0;
  handle.addEventListener('mousedown', e => { drag = true; sx = e.clientX; sw = sb.offsetWidth; handle.classList.add('drag'); e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (!drag) return; sb.style.width = Math.max(160, Math.min(480, sw + e.clientX - sx)) + 'px'; });
  document.addEventListener('mouseup', () => { drag = false; handle.classList.remove('drag'); });
}

function initRightColResize() {
  const handle = document.getElementById('rc-rh');
  const col = document.getElementById('fv-right');
  if (!handle || !col) return;
  handle.addEventListener('mousedown', e => {
    const sx = e.clientX, sw = col.offsetWidth;
    handle.classList.add('drag');
    e.preventDefault();
    const onMove = ev => {
      // handle is on the column's left edge, so dragging left widens it
      rightColW = Math.max(RIGHT_COL_MIN, Math.min(RIGHT_COL_MAX, sw - (ev.clientX - sx)));
      col.style.width = rightColW + 'px';
    };
    const onUp = () => {
      handle.classList.remove('drag');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function initRightResize() {
  const handle = document.getElementById('right-rh');
  if (!handle) return;
  handle.addEventListener('mousedown', e => {
    const sy = e.clientY, sh = tagPanelH;
    e.preventDefault();
    const onMove = ev => {
      const wrap = document.getElementById('tdp-wrap');
      if (!wrap) return;
      tagPanelH = Math.max(TAG_PANEL_MIN, sh + ev.clientY - sy);
      wrap.style.height = tagPanelH + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ═══════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// ═══════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initSidebarResize();

  // Keyboard shortcuts for file viewer
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if (e.key === 'ArrowLeft') { if (S.currentPage > 1) { S.currentPage--; showPage(); } }
    else if (e.key === 'ArrowRight') { if (S.currentPage < S.pageCount) { S.currentPage++; showPage(); } }
    else if (e.key === '+' || e.key === '=') { S.zoomPct = Math.min(300, S.zoomPct + 10); updateZoom(); }
    else if (e.key === '-') { S.zoomPct = Math.max(25, S.zoomPct - 10); updateZoom(); }
    else if (e.key === '0') { S.zoomPct = 100; updateZoom(); }
  });

  // Header
  document.getElementById('ws-chip').onclick = openWorkspace;
  document.getElementById('btn-refresh').onclick = () => refreshWorkspace();
  document.getElementById('sample-picker').onchange = e => {
    const sample = STATIC_SAMPLES.find(s => s.id === e.target.value);
    if (sample) selectStaticSample(sample);
  };
  document.getElementById('btn-setup').onclick = () => {
    if (S.route === '/setup') nav(prevRoute, prevRouteParams);
    else nav('/setup');
  };
  document.getElementById('btn-llm').onclick = () => {
    const sel = document.getElementById('llm-model-sel');
    const knownVals = [...sel.options].map(o => o.value).filter(v => v !== '__custom__');
    if (knownVals.includes(S.llm.model)) { sel.value = S.llm.model; document.getElementById('llm-custom-row').classList.add('hidden'); }
    else { sel.value = '__custom__'; document.getElementById('llm-custom-row').classList.remove('hidden'); document.getElementById('llm-custom-inp').value = S.llm.model; }
    const keyInp = document.getElementById('llm-key-inp');
    keyInp.value = S.llm.apiKey; keyInp.type = 'password';
    document.getElementById('eye-on').style.display = ''; document.getElementById('eye-off').style.display = 'none';
    document.getElementById('dlg-llm').classList.remove('hidden');
  };

  // LLM dialog
  document.getElementById('llm-model-sel').onchange = function () {
    document.getElementById('llm-custom-row').classList.toggle('hidden', this.value !== '__custom__');
  };
  const llmClose = () => document.getElementById('dlg-llm').classList.add('hidden');
  document.getElementById('llm-x').onclick = llmClose;
  document.getElementById('llm-cancel').onclick = llmClose;
  document.getElementById('dlg-llm').onclick = e => { if (e.target === e.currentTarget) llmClose(); };
  document.getElementById('llm-save').onclick = () => {
    const sel = document.getElementById('llm-model-sel');
    S.llm.model = sel.value === '__custom__' ? (document.getElementById('llm-custom-inp').value.trim() || 'claude-sonnet-4-6') : sel.value;
    S.llm.apiKey = document.getElementById('llm-key-inp').value.trim();
    saveLlm(); renderHeader();
    llmClose(); toast('LLM settings saved.');
  };
  document.getElementById('llm-key-eye').onclick = () => {
    const inp = document.getElementById('llm-key-inp');
    const show = inp.type === 'text'; inp.type = show ? 'password' : 'text';
    document.getElementById('eye-on').style.display = show ? '' : 'none';
    document.getElementById('eye-off').style.display = show ? 'none' : '';
  };

  // Anchor dialog
  const anchorClose = () => document.getElementById('dlg-anchor').classList.add('hidden');
  document.getElementById('anchor-x').onclick = anchorClose;
  document.getElementById('anchor-cancel').onclick = anchorClose;
  document.getElementById('dlg-anchor').onclick = e => { if (e.target === e.currentTarget) anchorClose(); };
  document.getElementById('anchor-confirm').onclick = confirmAnchor;

  // Verify dialog
  const verifyClose = () => document.getElementById('dlg-verify').classList.add('hidden');
  document.getElementById('verify-x').onclick = verifyClose;
  document.getElementById('verify-close').onclick = verifyClose;
  document.getElementById('dlg-verify').onclick = e => { if (e.target === e.currentTarget) verifyClose(); };

  render();
  detectWorkspaceAndBoot();
});

// ═══════════════════════════════════════════════════════════════════
// BOOT-TIME BACKEND / STATIC-BUNDLE DETECTION
// Runs once, after the first paint. Tries, in order: a real backend, then
// a bundled sample workspace, then falls back to the Welcome screen with
// the folder picker (today's plain-static-host / no-bundle behavior).
// ═══════════════════════════════════════════════════════════════════
async function detectWorkspaceAndBoot() {
  if (location.protocol === 'file:') return; // folder-picker only, unchanged

  // Is a real dgml-app-sample-server.py backend answering at this origin?
  try {
    const r = await fetch('/workspace/_index');
    if (r.ok) {
      const data = await r.json();
      IS_SERVER = true;
      if (data.root) {
        S.wsHandle = 'server';
        S.wsName = data.root.split(/[\\/]/).pop() || data.root;
        S.wsPath = data.root;
        await refreshWorkspace(true);
      }
      return;
    }
  } catch {}

  // No backend — are there sample workspaces to browse, either bundled
  // next to this file or (falling back) live from dgml-spec on GitHub?
  // See loadStaticFileList().
  try {
    const fileList = await loadStaticFileList();
    STATIC_SAMPLES = discoverStaticSamples(fileList);
    if (STATIC_SAMPLES.length) await selectStaticSample(STATIC_SAMPLES[0]);
  } catch {}
}
