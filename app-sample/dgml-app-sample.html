<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dgml-app-sample</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; }
    body { font-family: 'Inter', sans-serif; font-size: 14px; color: #111827; background: #fff; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; background: none; border: none; font: inherit; }
    input, select, textarea { font: inherit; }
    pre { font-family: 'Courier New', Courier, monospace; }

    :root {
      --dg-50:#f0fdf4; --dg-100:#dcfce7; --dg-200:#bbf7d0; --dg-300:#86efac;
      --dg-400:#4ade80; --dg-600:#1e7444; --dg-700:#15803d; --dg-800:#166534;
    }

    /* ── App shell ───────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; overflow: hidden; }
    #app-body { display: flex; min-height: 0; flex: 1; overflow: hidden; }
    #main-content { flex: 1; min-width: 0; min-height: 0; overflow: hidden; display: flex; flex-direction: column; }

    /* ── Header ──────────────────────────────────────────────── */
    #app-header {
      height: 48px; flex-shrink: 0; display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px; gap: 12px;
      background: var(--dg-600); border-bottom: 1px solid var(--dg-700);
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .hdr-logo { display: flex; align-items: center; gap: 8px; }
    .hdr-logo span { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -.025em; }
    .hdr-right { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .hdr-btn { display: flex; align-items: center; gap: 6px; padding: 4px; border-radius: 4px; font-size: 12px; font-weight: 500; color: #d6f7e3; transition: background .12s, color .12s; white-space: nowrap; }
    .hdr-btn:hover { background: #28a05e; color: #fff; }
    .hdr-btn-wide { padding: 4px 8px; }
    .ws-chip { font-family: monospace; font-size: 12px; color: #d6f7e3; padding: 2px 4px; border-radius: 4px; cursor: pointer; max-width: 560px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: background .12s, color .12s; }
    .ws-chip:hover { background: #28a05e; color: #fff; }
    #sample-picker { background: transparent; border: 1px solid rgba(255,255,255,.28); color: #d6f7e3; font-size: 12px; border-radius: 4px; padding: 3px 4px; max-width: 200px; cursor: pointer; }
    #sample-picker:hover { background: #28a05e; color: #fff; }
    .dot-amber { width: 6px; height: 6px; border-radius: 50%; background: #fbbf24; flex-shrink: 0; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar { flex-shrink: 0; width: 240px; display: flex; flex-direction: column; border-right: 1px solid #e5e7eb; background: #fff; overflow: hidden; }
    #sidebar-inner { flex: 1; overflow-y: auto; }
    #resize-handle { width: 4px; flex-shrink: 0; cursor: col-resize; transition: background .12s; }
    #resize-handle:hover, #resize-handle.drag { background: var(--dg-300); }
    .sb-section-lbl { padding: 20px 12px 4px; font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #9ca3af; }
    .sb-ds-group { }
    .sb-ds-hdr { display: flex; align-items: center; padding-right: 8px; }
    .sb-ds-toggle { width: 24px; height: 24px; display: grid; place-items: center; flex-shrink: 0; color: #9ca3af; font-size: 14px; line-height: 1; cursor: pointer; transition: color .12s; user-select: none; }
    .sb-ds-toggle:hover { color: #374151; }
    .sb-ds-toggle.open { transform: rotate(90deg); }
    .sb-ds-name { flex: 1; min-width: 0; border-radius: 4px; padding: 4px 4px; font-size: 13px; font-weight: 600; color: #374151; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .1s; }
    .sb-ds-name:hover { color: var(--dg-600); }
    .sb-ds-name.active { color: var(--dg-600); }
    .sb-file { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-left: 2px solid transparent; font-size: 13px; color: #4b5563; cursor: pointer; transition: background .1s, color .1s, border-color .1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-file:hover { background: #f9fafb; color: #111827; }
    .sb-file.active { border-left-color: var(--dg-500, #28a05e); background: #edfbf3; color: #166534; font-weight: 500; }
    .sb-file svg { flex-shrink: 0; opacity: .5; }
    .sb-file .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }

    /* ── Generic page scaffold ───────────────────────────────── */
    .page { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .page-hdr { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
    .page-title { font-size: 16px; font-weight: 600; }
    .page-body { flex: 1; overflow: auto; padding: 20px; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: background .12s; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--dg-600); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--dg-700); }
    .btn-secondary { background: #f3f4f6; color: #374151; border: 1px solid #e5e7eb; }
    .btn-secondary:hover { background: #e5e7eb; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }

    /* ── Welcome ─────────────────────────────────────────────── */
    .welcome-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; overflow: auto; }
    .welcome-card { max-width: 480px; text-align: center; padding: 40px; }
    .welcome-icon { margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
    .welcome-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .welcome-sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; line-height: 1.6; }
    .welcome-actions { display: flex; flex-direction: column; gap: 12px; align-items: center; }

    /* ── Card grid ───────────────────────────────────────────── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 16px; }
    .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; cursor: pointer; transition: all .15s; }
    .card:hover { border-color: var(--dg-300); box-shadow: 0 2px 8px rgba(30,116,68,.1); }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; word-break: break-all; }
    .card-sub { font-size: 12px; color: #6b7280; }

    /* ── File viewer ─────────────────────────────────────────── */
    .fv-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* toolbar */
    .fv-toolbar {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; border-bottom: 1px solid #e5e7eb; background: #fff; gap: 8px;
    }
    .fv-filename { font-size: 13px; font-weight: 600; color: var(--dg-800); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
    .fv-nav { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }
    .nav-btn { padding: 3px 8px; border-radius: 4px; font-size: 12px; color: #6b7280; transition: background .1s; }
    .nav-btn:hover:not(:disabled) { background: var(--dg-50); color: var(--dg-600); }
    .nav-btn:disabled { color: #d1d5db; cursor: default; }
    .nav-sep { width: 1px; height: 16px; background: #e5e7eb; margin: 0 4px; }
    .nav-count { font-size: 12px; color: #374151; min-width: 56px; text-align: center; tabular-nums: all; }
    .zoom-label { font-size: 11px; color: #6b7280; min-width: 38px; text-align: center; cursor: pointer; border-radius: 4px; padding: 3px 4px; }
    .zoom-label:hover { background: var(--dg-50); color: var(--dg-600); }

    /* three-pane body */
    .fv-body { flex: 1; display: flex; min-height: 0; overflow: hidden; }

    /* page column */
    .fv-page-col { flex: 1; min-width: 0; overflow: auto; background: #e5e7eb; display: flex; flex-direction: column; align-items: center; padding: 16px; }
    .page-stage-wrap { background: #fff; border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,.25); position: relative; }
    .page-stage-wrap img { display: block; width: 100%; }
    .page-stage-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; }

    /* right column */
    .fv-right-col { flex-shrink: 0; width: 300px; display: flex; flex-direction: column; border-left: 1px solid #e5e7eb; background: #fff; overflow: hidden; }
    .right-resize-handle { height: 4px; flex-shrink: 0; cursor: row-resize; transition: background .1s; }
    .right-resize-handle:hover { background: var(--dg-200); }
    .rc-resize-handle { width: 4px; flex-shrink: 0; cursor: col-resize; transition: background .12s; }
    .rc-resize-handle:hover, .rc-resize-handle.drag { background: var(--dg-300); }

    /* ── Tag Discovery Panel ─────────────────────────────────── */
    .tdp { display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; border-bottom: 1px solid #e5e7eb; background: #fff; }
    .tdp-filters { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 8px 4px; }
    .tdp-btn {
      padding: 1px 8px; border-radius: 4px; font-size: 12px; font-weight: 500;
      border: 1px solid #d1d5db; color: #4b5563; background: #fff; cursor: pointer;
      transition: background .1s, border-color .1s, color .1s;
    }
    .tdp-btn:hover:not(.active) { background: var(--dg-50); color: var(--dg-700); border-color: var(--dg-300); }
    .tdp-btn.active { background: var(--dg-600); color: #fff; border-color: var(--dg-600); }
    .tdp-btn.sem.no-key { border: 1px dashed #d1d5db; }
    .tdp-btn.sem.loading { border: 1px dashed var(--dg-400); animation: border-dash 1s linear infinite; }
    .tdp-search-wrap { position: relative; padding: 0 8px 4px; }
    .tdp-search { width: 100%; padding: 2px 22px 2px 8px; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 12px; color: #374151; outline: none; }
    .tdp-search::placeholder { color: #9ca3af; }
    .tdp-search:focus { border-color: var(--dg-400); }
    .tdp-search-ico { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--dg-600); pointer-events: none; }
    .tdp-chips { display: flex; flex-wrap: wrap; gap: 4px; padding: 4px 8px 8px; max-height: 128px; overflow-y: auto; }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; font-size: 12px; border: 1px solid #e5e7eb; color: #4b5563; background: #fff; cursor: pointer; transition: background .08s, border-color .08s, color .08s; }
    .chip:hover { background: var(--dg-50); border-color: var(--dg-300); }
    .chip.hov { background: var(--dg-50); color: var(--dg-800); border-color: var(--dg-300); }
    .chip.sel { background: var(--dg-600); color: #fff; border-color: var(--dg-600); }
    .chip-cnt { font-size: 10px; color: #9ca3af; }
    .chip.sel .chip-cnt { color: #bbf7d0; }
    .tdp-empty { font-size: 12px; color: #9ca3af; font-style: italic; padding: 8px; }

    /* ── DGML Tree Panel ─────────────────────────────────────── */
    .tree-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; background: #fff; }
    .tree-hdr { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--dg-700); padding: 8px 12px; border-bottom: 1px solid #e5e7eb; background: var(--dg-50); flex-shrink: 0; }
    .tree-scroll { flex: 1; overflow: auto; padding: 8px 0; font-size: 14px; }
    .tree-node-wrap { }
    .tree-node-row { display: flex; align-items: flex-start; }
    .tree-toggle { width: 20px; flex-shrink: 0; padding: 4px 0; text-align: center; font-size: 10px; color: #9ca3af; user-select: none; cursor: pointer; }
    .tree-toggle:hover { color: #374151; }
    .tree-toggle.invisible { visibility: hidden; cursor: default; }
    .tree-node-btn { display: block; flex: 1; min-width: 0; border-radius: 4px; padding: 4px 6px; text-align: left; cursor: pointer; transition: background .1s; }
    .tree-node-btn:hover { background: #f3f4f6; }
    .tree-node-btn.tag-sel { background: #bbf7d0; outline: 1px solid #6dd89a; }
    .tree-node-btn.tag-hov { background: #edfbf3; outline: 1px solid #a8edbe; }
    .tree-node-btn.no-boxes { cursor: default; }
    .tree-tag { font-family: monospace; font-size: 12px; color: var(--dg-600); font-weight: 500; }
    .tree-preview { margin-left: 8px; font-size: 12px; color: #6b7280; }
    .tree-placeholder { font-size: 12px; color: #9ca3af; padding: 12px; font-style: italic; }
    .computed-badge { display: inline-flex; align-items: center; margin-left: 6px; padding: 0 5px; border-radius: 3px; font-size: 10px; font-weight: 600; background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }
    .tree-node-btn.computed .tree-tag { color: #7c3aed; }
    .extraction-badge { display: inline-flex; align-items: center; margin-left: 6px; padding: 0 5px; border-radius: 3px; font-size: 10px; font-weight: 600; background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }

    /* ── Anchor strip ────────────────────────────────────────── */
    .anchor-strip { flex-shrink: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 6px 12px; border-top: 1px solid #e5e7eb; background: #fff; min-height: 36px; }
    .anchor-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #9ca3af; white-space: nowrap; }
    .anchor-basket { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; align-items: center; min-width: 0; }
    .basket-empty { font-size: 11px; color: #d1d5db; font-style: italic; }
    .basket-tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 11px; color: #374151; background: #fff; cursor: pointer; transition: all .1s; }
    .basket-tag:hover { background: var(--dg-50); border-color: var(--dg-300); }
    .basket-tag.sel { background: var(--dg-600); color: #fff; border-color: var(--dg-600); }
    .basket-tag.hov { background: var(--dg-50); color: var(--dg-800); border-color: var(--dg-300); }
    .basket-rm { color: #9ca3af; font-size: 13px; line-height: 1; }
    .basket-rm:hover { color: #ef4444; }
    .anchor-add-btn { padding: 2px 8px; border: 1px solid var(--dg-300); border-radius: 4px; font-size: 11px; font-weight: 500; color: var(--dg-700); transition: background .1s; }
    .anchor-add-btn:hover { background: var(--dg-50); }
    .anchor-now-btn { padding: 3px 12px; background: var(--dg-600); color: #fff; border-radius: 4px; font-size: 11px; font-weight: 600; transition: background .1s; }
    .anchor-now-btn:hover { background: var(--dg-700); }
    .anchor-history { border-top: 1px solid #f3f4f6; background: #fafafa; padding: 5px 12px; }
    .anchor-history-hdr { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #9ca3af; margin-bottom: 3px; }
    .anchor-rec { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4b5563; margin-bottom: 2px; }
    .anc-ts { color: #9ca3af; font-size: 10px; white-space: nowrap; flex-shrink: 0; }
    .anc-chain { background: #e5e7eb; border-radius: 3px; padding: 1px 5px; font-size: 10px; font-weight: 500; color: #374151; flex-shrink: 0; }
    .anc-tags { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .anc-tx { font-family: monospace; font-size: 10px; color: #9ca3af; flex-shrink: 0; }
    .anc-verify { border: 1px solid var(--dg-300); border-radius: 3px; padding: 1px 5px; font-size: 10px; font-weight: 500; color: var(--dg-700); white-space: nowrap; flex-shrink: 0; }
    .anc-verify:hover { background: var(--dg-50); }

    /* ── Setup / Pipeline ────────────────────────────────────── */
    .setup-tabs { display: flex; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
    .setup-tab { padding: 10px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; color: #6b7280; font-weight: 500; transition: all .15s; }
    .setup-tab.active { color: var(--dg-600); border-bottom-color: var(--dg-600); }
    .setup-tab:hover:not(.active) { color: #374151; }
    .setup-panel { padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; max-width: 640px; overflow-y: auto; flex: 1; }
    .form-row { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 13px; font-weight: 500; color: #374151; }
    .form-hint { font-size: 12px; color: #9ca3af; }
    .form-input { padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; outline: none; }
    .form-input:focus { border-color: var(--dg-600); box-shadow: 0 0 0 3px rgba(30,116,68,.1); }
    .stub-notice { background: #fef3c7; border: 1px solid #fde68a; border-radius: 8px; padding: 12px 14px; color: #92400e; font-size: 12px; line-height: 1.6; }
    .step-list { display: flex; flex-direction: column; gap: 8px; }
    .step-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .step-ico { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; }
    .step-ico.pending { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }
    .step-ico.running { background: var(--dg-100); color: var(--dg-600); border: 1px solid var(--dg-300); animation: spin .8s linear infinite; }
    .step-ico.done { background: var(--dg-600); color: #fff; }
    .step-ico.error { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
    .log-box { background: #0f1117; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; line-height: 1.6; color: #d1fae5; max-height: 180px; overflow-y: auto; }
    .flex-row { display: flex; gap: 8px; }

    /* ── Dialogs ─────────────────────────────────────────────── */
    .dlg-back { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; display: flex; align-items: center; justify-content: center; }
    .dlg { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.25); width: 440px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .dlg-wide { width: 560px; }
    .dlg-hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #e5e7eb; }
    .dlg-title { font-size: 14px; font-weight: 600; color: #111827; }
    .dlg-close { color: #9ca3af; padding: 4px; border-radius: 4px; }
    .dlg-close:hover { background: #f3f4f6; color: #374151; }
    .dlg-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
    .dlg-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 20px; border-top: 1px solid #e5e7eb; }
    .key-row { display: flex; gap: 6px; }
    .key-row input { flex: 1; }
    .key-toggle { padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; color: #6b7280; cursor: pointer; background: #f9fafb; display: flex; align-items: center; justify-content: center; }
    .key-toggle:hover { background: #f3f4f6; }
    .sel-input { padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; outline: none; width: 100%; }
    .sel-input:focus { border-color: var(--dg-600); }
    .section-lbl { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: #9ca3af; margin-bottom: 5px; }
    .code-green { background: #0f1117; border-radius: 6px; padding: 12px 14px; font-size: 11px; color: #4ade80; font-family: monospace; white-space: pre; overflow-x: auto; }
    .code-amber { background: #0f1117; border-radius: 6px; padding: 12px 14px; font-size: 11px; color: #fcd34d; font-family: monospace; white-space: pre; overflow-x: auto; }
    .tag-pill { display: inline-flex; padding: 2px 8px; border: 1px solid var(--dg-300); background: var(--dg-50); border-radius: 4px; font-size: 11px; font-weight: 500; color: var(--dg-800); margin: 2px; }
    .cli-notice { background: #fef3c7; border: 1px solid #fde68a; border-radius: 6px; padding: 10px 12px; font-size: 12px; color: #92400e; }
    .cli-confirmed { background: #f0fdf4; border: 1px solid var(--dg-200); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: var(--dg-700); }

    /* ── Toast ───────────────────────────────────────────────── */
    #toast-box { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: #111827; color: #fff; padding: 9px 14px; border-radius: 8px; font-size: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.3); animation: slidein .2s ease; }
    .toast.err { background: #dc2626; }

    /* ── Misc ────────────────────────────────────────────────── */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,.1); border-top-color: var(--dg-600); border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    .empty { color: #9ca3af; text-align: center; padding: 60px 20px; font-size: 13px; }
    .hidden { display: none !important; }
    code { font-family: monospace; font-size: .9em; background: #f3f4f6; padding: 1px 4px; border-radius: 3px; }

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════
// True only once a real dgml-app-sample-server.py backend has answered at
// boot (see detectWorkspaceAndBoot) — not just "not file:". A plain static
// host (GitHub Pages, `python -m http.server`, ...) has no backend either,
// so this must default false and be confirmed live, not inferred from the
// protocol.
let IS_SERVER = false;
// Set once a bundled sample workspace (samples/<slug>/dgml-workspace,
// discovered via samples/file-list.json) is the active workspace — lets
// buildIndex()/findXml()/getPageBlobUrl() read real workspace files over
// fetch() instead of a FileSystemDirectoryHandle, with no backend
// involved. The fetch may be local-relative or point at the
// REMOTE_SAMPLES_BASE fallback (see staticUrl()) — independent of
// IS_SERVER either way: this is about how bytes for the *currently open*
// workspace are read, not whether a backend exists.
let WORKSPACE_READ_BASE = null;
// Bundled sample workspaces discovered in samples/file-list.json, for the
// "sample workspaces" picker: [{ id, name, base }].
let STATIC_SAMPLES = [];
const DG_NS = 'http://www.docugami.com/2021/dgml';
// One box per visual line, "; "-separated within a single dg:origin attribute.
const ORIGIN_RE = /^(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)$/;
const LLM_KEY = 'dgml-app-llm-settings';
const delay = ms => new Promise(r => setTimeout(r, ms));
const SEMANTIC_FILTERS = ['Who / What?', 'When?', 'Amounts', 'Defined as?', 'Rules & Conditions'];
const ALGO_FILTERS = ['Sections', 'Values', 'Density', 'Patterns'];
const PIPELINE_STEPS = ['Initialize workspace', 'Add files (recursive)', 'Cluster documents', 'Generate DGML', 'Ground markup'];
const FAKE_OUTPUT = [
  ['Initializing workspace…', 'Workspace ready.'],
  ['Scanning PDF folder…', 'Found 3 files.', 'Adding file 1/3…', 'Adding file 2/3…', 'Adding file 3/3…'],
  ['Clustering documents…', 'Identified 1 cluster.', 'Docset created: my-docset'],
  ['Generating DGML XML…', 'Processing page 1…', 'Processing page 2…', 'Generation complete.'],
  ['Grounding markup…', 'Matching structure…', 'Grounding complete.'],
];

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
const S = {
  // workspace
  wsHandle: null, wsName: '', wsPath: '', wsIndex: null,
  // routing
  route: '/', routeParams: {},
  // llm
  llm: loadLlm(),
  // file viewer — reset on file switch
  fileId: null, docsetId: null, pageCount: 0,
  currentPage: 1, zoomPct: 100,
  // XML / overlays
  xmlStr: null,
  // overlaysByPage: Map<pageNum, [{tag,x,y,w,h}]>  (percent coords, raw from XML)
  overlaysByPage: new Map(),
  // selection — four independent axes (mirrors React uiSlice)
  selTag: null, selNodeId: null,
  hovTag: null, hovNodeId: null,
  // basket / anchor history
  basket: [], anchorHistory: [],
  // tag panel
  tagFilter: 'All', tagSearch: '', semanticMap: {}, semanticLoading: false, semanticError: null,
  describeResults: null, describeLoading: false,
  // blobs
  blobCache: {},
  // pipeline
  pipelineRunning: false, lastWorkspaceDir: '',
};

// per-render panel heights
let tagPanelH = 220;
const TAG_PANEL_MIN = 140;

// per-render right-column width (holds the Tag Discovery panel + DGML tree)
let rightColW = 300;
const RIGHT_COL_MIN = 220;
const RIGHT_COL_MAX = 640;

// tag metrics cache for current file
let _metrics = [];
let _descDebounce = null;
// computed-field index for current file: nodeId -> { hrefIds, hrefTargets, hrefTags }
// (dg:origin="computed" elements — derived values with no page box of their own;
// hrefTargets/hrefTags resolve their dg:href to the real grounded fields they came from)
let _computedMap = new Map();

function resetFileState() {
  S.fileId = null; S.docsetId = null; S.pageCount = 0;
  S.currentPage = 1; S.zoomPct = 100;
  S.xmlStr = null; S.overlaysByPage = new Map();
  S.selTag = null; S.selNodeId = null; S.hovTag = null; S.hovNodeId = null; S.basket = [];
  S.tagFilter = 'All'; S.tagSearch = ''; S.semanticMap = {};
  S.semanticLoading = false; S.semanticError = null; S.describeResults = null; S.describeLoading = false;
  _metrics = []; _computedMap = new Map();
}

// ═══════════════════════════════════════════════════════════════════
// LLM SETTINGS PERSISTENCE
// ═══════════════════════════════════════════════════════════════════
function loadLlm() {
  try { const s = localStorage.getItem(LLM_KEY); if (s) return JSON.parse(s); } catch {}
  return { model: 'claude-sonnet-4-6', apiKey: '' };
}
function saveLlm() { localStorage.setItem(LLM_KEY, JSON.stringify(S.llm)); }

// ═══════════════════════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════════════════════
let prevRoute = '/'; let prevRouteParams = {};
function nav(route, params = {}) { if (S.route !== route) { prevRoute = S.route; prevRouteParams = S.routeParams; } S.route = route; S.routeParams = params; render(); }

// ═══════════════════════════════════════════════════════════════════
// FILE SYSTEM ACCESS API
// ═══════════════════════════════════════════════════════════════════
async function getDirHandle(root, ...parts) {
  let h = root;
  for (const p of parts) { try { h = await h.getDirectoryHandle(p); } catch { return null; } }
  return h;
}
async function listDirNames(dh) {
  const r = [];
  try { for await (const [n, e] of dh.entries()) if (e.kind === 'directory' && !n.startsWith('.')) r.push(n); } catch {}
  return r.sort();
}
async function listFileNames(dh) {
  const r = [];
  try { for await (const [n, e] of dh.entries()) if (e.kind === 'file') r.push(n); } catch {}
  return r.sort();
}
async function readFileText(dh, name) {
  try { return await (await (await dh.getFileHandle(name)).getFile()).text(); } catch { return null; }
}
async function getBlobUrl(fileHandle) {
  return URL.createObjectURL(await fileHandle.getFile());
}

// ═══════════════════════════════════════════════════════════════════
// STATIC SAMPLE BUNDLE — reads real workspace files over fetch(), no
// backend, no precomputed content. samples/file-list.json is the ONLY
// precomputed artifact (see scripts/gen_samples_file_list.py in the
// dgml-spec repo, which publishes samples/): a flat list of real paths,
// standing in for the directory listing a static host can't serve. It is
// committed alongside samples/ in dgml-spec. Docset names, file names/page counts, and
// each file's real *.dgml.xml name are all read from the same real
// docset.json / file.json / *.dgml.xml files a FileSystemDirectoryHandle
// would have read — just fetched instead of walked.
//
// Tries a local samples/ folder first, then falls back to the same data
// served live from dgml-spec's main branch on GitHub, so this exact file
// works standalone with zero copying too.
//
// "Local" is checked at two possible relative locations, since this same
// file can be deployed two different ways: samples/ sitting in the *same*
// folder as this file (e.g. dgml.io/examples/{dgml-app-sample.html,samples/})
// vs. samples/ one level *up*, a sibling of the folder this file lives in.
// Both are tried before the remote fallback. In this repo no local samples/
// is bundled (they live in dgml-spec), so the remote fallback is used.
// ═══════════════════════════════════════════════════════════════════
const REMOTE_SAMPLES_BASE = 'https://raw.githubusercontent.com/dgml-io/dgml-spec/main/';
const LOCAL_SAMPLES_BASE_CANDIDATES = ['', '../'];

let _staticFileListCache = null;
let _staticSourceBase = ''; // wherever samples/file-list.json was actually found

// Every fetch the static-bundle code makes goes through here, so switching
// between a local copy (either relative shape) and the remote fallback is
// one variable, not a second code path.
function staticUrl(path) { return _staticSourceBase + path; }

async function loadStaticFileList() {
  if (_staticFileListCache) return _staticFileListCache;
  for (const source of [...LOCAL_SAMPLES_BASE_CANDIDATES, REMOTE_SAMPLES_BASE]) {
    try {
      const r = await fetch(`${source}samples/file-list.json`);
      if (r.ok) {
        _staticSourceBase = source;
        _staticFileListCache = await r.json();
        return _staticFileListCache;
      }
    } catch {}
  }
  throw new Error(`no samples/file-list.json found locally or at ${REMOTE_SAMPLES_BASE}`);
}

// Every distinct `samples/<slug>/dgml-workspace` root present in the list.
function discoverStaticSamples(fileList) {
  const roots = new Map(); // base path -> slug
  const re = /^(samples\/([^/]+)\/dgml-workspace)\//;
  for (const p of fileList) {
    const m = re.exec(p);
    if (m) roots.set(m[1], m[2]);
  }
  return [...roots.entries()].map(([base, slug]) => ({
    id: slug,
    name: slug.replace(/^\d+-/, '').replace(/-/g, ' '),
    base,
  }));
}

// Docset ids, each docset's file ids, and each file's real *.dgml.xml
// filename (the one genuinely unpredictable name) — all parsed from path
// strings under one workspace root.
function staticWorkspaceLayout(fileList, base) {
  const prefix = `${base}/`;
  const docsets = new Map(); // dsId -> { fileIds: Set, xmlNameByFile: Map }
  const topFileIds = new Set();
  for (const p of fileList) {
    if (!p.startsWith(prefix)) continue;
    const rel = p.slice(prefix.length);
    let m = /^docsets\/([^/]+)\/files\/([^/]+)\/(.+\.dgml\.xml)$/.exec(rel);
    if (m) {
      const [, dsId, fileId, xmlName] = m;
      if (!docsets.has(dsId)) docsets.set(dsId, { fileIds: new Set(), xmlNameByFile: new Map() });
      docsets.get(dsId).fileIds.add(fileId);
      docsets.get(dsId).xmlNameByFile.set(fileId, xmlName);
      continue;
    }
    m = /^files\/([^/]+)\//.exec(rel);
    if (m) topFileIds.add(m[1]);
  }
  return { docsets, topFileIds };
}

async function buildStaticIndex(base) {
  const fileList = await loadStaticFileList();
  const { docsets, topFileIds } = staticWorkspaceLayout(fileList, base);

  const docsetEntries = await Promise.all([...docsets.entries()].map(async ([id, d]) => {
    let name = id;
    try {
      const meta = await fetch(staticUrl(`${base}/docsets/${id}/docset.json`)).then(r => r.json());
      name = meta.name || id;
    } catch {}
    return { id, name, fileIds: [...d.fileIds] };
  }));

  const fileEntries = await Promise.all([...topFileIds].map(async id => {
    try {
      const meta = await fetch(staticUrl(`${base}/files/${id}/file.json`)).then(r => r.json());
      return { id, filename: meta.original_filename || id, pageCount: meta.page_count || 0 };
    } catch { return { id, filename: id, pageCount: 0 }; }
  }));

  return { docsets: docsetEntries, files: fileEntries };
}

async function findStaticXml(base, docsetId, fileId) {
  const fileList = await loadStaticFileList();
  const { docsets } = staticWorkspaceLayout(fileList, base);
  const xmlName = docsets.get(docsetId)?.xmlNameByFile.get(fileId);
  if (!xmlName) return null;
  try {
    const url = staticUrl(`${base}/docsets/${docsetId}/files/${fileId}/${encodeURIComponent(xmlName)}`);
    const r = await fetch(url);
    return r.ok ? r.text() : null;
  } catch { return null; }
}

async function buildIndex(root) {
  if (IS_SERVER) {
    const data = await fetch('/workspace/_index').then(r => r.json());
    // server returns {root, docsets:[{id,name,fileIds}], files:[{id,filename,pageCount}]}
    return { docsets: data.docsets || [], files: data.files || [] };
  }
  if (WORKSPACE_READ_BASE) return buildStaticIndex(WORKSPACE_READ_BASE);
  const docsetsDir = await getDirHandle(root, 'docsets');
  const filesDir = await getDirHandle(root, 'files');
  const docsetIds = docsetsDir ? await listDirNames(docsetsDir) : [];
  const fileIds = filesDir ? await listDirNames(filesDir) : [];
  const docsets = await Promise.all(docsetIds.map(async id => {
    const dd = await getDirHandle(docsetsDir, id);
    const fd = await getDirHandle(docsetsDir, id, 'files');
    let name = id;
    if (dd) { try { const t = await readFileText(dd, 'docset.json'); if (t) { const m = JSON.parse(t); name = m.name || id; } } catch {} }
    return { id, name, fileIds: fd ? await listDirNames(fd) : [] };
  }));
  const files = await Promise.all(fileIds.map(async id => {
    try {
      const d = await getDirHandle(filesDir, id);
      if (d) { const t = await readFileText(d, 'file.json'); if (t) { const m = JSON.parse(t); return { id, filename: m.original_filename || id, pageCount: m.page_count || 0 }; } }
    } catch {}
    return { id, filename: id, pageCount: 0 };
  }));
  return { docsets, files };
}

async function findXml(root, docsetId, fileId) {
  if (IS_SERVER) {
    try {
      const data = await fetch(`/workspace/docsets/${encodeURIComponent(docsetId)}/files/${encodeURIComponent(fileId)}/_dgml`).then(r => r.ok ? r.json() : null);
      return data?.xml ?? null;
    } catch { return null; }
  }
  if (WORKSPACE_READ_BASE) return findStaticXml(WORKSPACE_READ_BASE, docsetId, fileId);
  const dir = await getDirHandle(root, 'docsets', docsetId, 'files', fileId);
  if (!dir) return null;
  const names = await listFileNames(dir);
  // <stem>.dgml.xml is grounded in place (dg:origin) — no separate grounded artifact.
  const chosen = names.find(n => n.endsWith('.dgml.xml'));
  if (!chosen) return null;
  return (await (await dir.getFileHandle(chosen)).getFile()).text();
}

async function getPageBlobUrl(root, fileId, page) {
  if (IS_SERVER) {
    // Pages are named page_1.png, page_2.png, … (PAGE_FILENAME_TEMPLATE = "page_%d.png")
    return `/workspace/files/${encodeURIComponent(fileId)}/page_images/page_${page}.png`;
  }
  if (WORKSPACE_READ_BASE) {
    return staticUrl(`${WORKSPACE_READ_BASE}/files/${encodeURIComponent(fileId)}/page_images/page_${page}.png`);
  }
  const key = `${fileId}/${page}`;
  if (S.blobCache[key]) return S.blobCache[key];
  const dir = await getDirHandle(root, 'files', fileId, 'page_images');
  if (!dir) return null;
  const p4 = String(page).padStart(4, '0'), p3 = String(page).padStart(3, '0');
  for (const name of [`page_${p4}.png`, `page_${p3}.png`, `page_${page}.png`, `${page}.png`]) {
    try { const url = await getBlobUrl(await dir.getFileHandle(name)); S.blobCache[key] = url; return url; } catch {}
  }
  const imgs = (await listFileNames(dir)).filter(n => /\.(png|jpe?g)$/i.test(n));
  if (imgs[page - 1]) {
    try { const url = await getBlobUrl(await dir.getFileHandle(imgs[page - 1])); S.blobCache[key] = url; return url; } catch {}
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════
// DGML BOX PARSING
// ═══════════════════════════════════════════════════════════════════

// Parse dg:origin: "; "-separated list of boxes, each "<page> <x1> <y1> <x2> <y2>"
// (pixel coords). An element gets one box per visual line, and since a line
// can only be on one page but a multi-line element can span several, the
// boxes in a single attribute are not all guaranteed to share the same page.
function parseOriginAttr(val) {
  const out = [];
  for (const part of (val || '').split(';')) {
    const m = ORIGIN_RE.exec(part.trim());
    if (!m) continue;
    const [, page, x1, y1, x2, y2] = m.map(Number);
    out.push({ page, x: x1, y: y1, w: x2 - x1, h: y2 - y1 });
  }
  return out;
}

// Returns Map<pageNum, [{tag,nodeId,x,y,w,h}]> shallow-first, one entry per
// box — a node with several boxes on the same page contributes one rect per
// box, all sharing its nodeId.
function buildOverlaysByPage(xmlStr) {
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');
  if (doc.querySelector('parsererror')) return new Map();
  const entries = [];
  function walk(el, depth, nodeId) {
    const origin = el.getAttributeNS(DG_NS, 'origin') ?? el.getAttribute('dg:origin');
    // Pure containers (sections, lists, tables, rows, the root) now carry a
    // dg:origin too — one union box per page over their whole grounded
    // subtree. Skip those for the overlay: only elements with a direct
    // text-node child (leaves and mixed-content parents) are real content,
    // and drawing the container's box on top just paints one big rect over
    // everything underneath it.
    const hasDirectText = [...el.childNodes].some(n => n.nodeType === 3 && (n.textContent || '').trim());
    if (origin && hasDirectText) {
      for (const box of parseOriginAttr(origin))
        entries.push({ depth, tag: el.tagName, nodeId, ...box });
    }
    for (let i = 0; i < el.children.length; i++) walk(el.children[i], depth + 1, `${nodeId}/${i}`);
  }
  walk(doc.documentElement, 0, 'r');
  // Sort shallow-first so parent rects paint before child rects in SVG
  entries.sort((a, b) => a.depth - b.depth);
  const byPage = new Map();
  for (const e of entries) {
    if (!byPage.has(e.page)) byPage.set(e.page, []);
    byPage.get(e.page).push({ tag: e.tag, nodeId: e.nodeId, x: e.x, y: e.y, w: e.w, h: e.h });
  }
  return byPage;
}

function firstPageForTag(tag) {
  for (const [page, rects] of S.overlaysByPage) {
    if (rects.some(r => stripNs(r.tag) === tag)) return page;
  }
  return null;
}

// A node's boxes can span several pages (one box per visual line). When
// navigating to a node that isn't selected yet and has nothing on the
// current page, jump to whichever of its pages is closest to the one
// being viewed rather than always the first one in document order.
function nearestPageForNodeId(nodeId) {
  let best = null, bestDist = Infinity;
  for (const [page, rects] of S.overlaysByPage) {
    if (!rects.some(r => r.nodeId === nodeId)) continue;
    const dist = Math.abs(page - S.currentPage);
    if (dist < bestDist) { best = page; bestDist = dist; }
  }
  return best;
}

function jumpToPage(page) {
  if (page && page !== S.currentPage) { S.currentPage = page; showPage(); }
}

// A dg:href value is a "; "-separated (React port also tolerates bare
// whitespace) list of "#xml:id" references — same separator convention as
// dg:origin's own multi-box lists.
function parseHrefIds(href) {
  return (href || '').split(/[;\s]+/).map(s => s.trim().replace(/^#/, '')).filter(Boolean);
}

// dg:origin="computed" marks a derived value (e.g. a computed total) that was
// never read off the page — there is no box to draw for it. Its provenance is
// carried by dg:href, which names the xml:id of each field it was computed
// from. This walks the doc once to build xml:id -> nodeId (the same 'r/i0/i1'
// scheme buildOverlaysByPage/buildTreeNodes use) so those references resolve
// to real, groundable nodes.
function buildComputedIndex(xmlStr) {
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');
  if (doc.querySelector('parsererror')) return new Map();
  const idToNodeId = new Map();
  const nodeIdToTag = new Map();
  const computedEntries = [];
  function walk(el, nodeId) {
    const xmlId = el.getAttribute('xml:id');
    if (xmlId) idToNodeId.set(xmlId, nodeId);
    nodeIdToTag.set(nodeId, el.tagName);
    const origin = (el.getAttributeNS(DG_NS, 'origin') ?? el.getAttribute('dg:origin') ?? '').trim();
    if (origin === 'computed') {
      const href = el.getAttributeNS(DG_NS, 'href') ?? el.getAttribute('dg:href') ?? '';
      computedEntries.push({ nodeId, hrefIds: parseHrefIds(href) });
    }
    for (let i = 0; i < el.children.length; i++) walk(el.children[i], `${nodeId}/${i}`);
  }
  walk(doc.documentElement, 'r');
  const map = new Map();
  for (const { nodeId, hrefIds } of computedEntries) {
    const hrefTargets = hrefIds.map(id => idToNodeId.get(id)).filter(Boolean);
    const hrefTags = hrefTargets.map(nid => stripNs(nodeIdToTag.get(nid) || '')).filter(Boolean);
    map.set(nodeId, { hrefIds, hrefTargets, hrefTags });
  }
  return map;
}

// ═══════════════════════════════════════════════════════════════════
// SVG OVERLAY
// viewBox="0 0 100 100" + rects at percent coords + CSS inset:0 fill parent.
// Zero dependency on image pixel dimensions — always correct regardless of timing.
// ═══════════════════════════════════════════════════════════════════
function renderOverlay() {
  const svg = document.getElementById('pg-svg');
  if (!svg) return;

  const { selTag, selNodeId, hovTag, hovNodeId, basket } = S;
  const rects = S.overlaysByPage.get(S.currentPage) || [];
  if (!rects.length) { svg.innerHTML = ''; return; }

  // SVG viewBox is always 0 0 100 100 (percent-of-page).
  // dg:origin rects are in pixels → convert using image natural dims.
  // Re-render is triggered from img.onload if dimensions aren't available yet.
  const pgImg = document.getElementById('pg-img');
  const imgW = pgImg?.naturalWidth || 0;
  const imgH = pgImg?.naturalHeight || 0;

  // If the current selection is a computed field, its own value has no box —
  // highlight the real, grounded fields it was derived from instead.
  const computedInfo = selNodeId ? _computedMap.get(selNodeId) : null;
  const sourceNodeIds = computedInfo ? new Set(computedInfo.hrefTargets) : null;

  svg.innerHTML = rects.map(r => {
    if (!imgW || !imgH) return ''; // image not decoded yet; onload will re-render
    const x = r.x * 100 / imgW, y = r.y * 100 / imgH;
    const w = r.w * 100 / imgW, h = r.h * 100 / imgH;
    const tag = stripNs(r.tag);
    // Exact React OR logic: selected = nodeId match OR tag match
    const isSel = (!!selNodeId && r.nodeId === selNodeId) || (!!selTag && tag === selTag);
    const isHov = !isSel && ((!!hovNodeId && r.nodeId === hovNodeId) || (!!hovTag && tag === hovTag));
    const isSource = !isSel && !isHov && !!sourceNodeIds && sourceNodeIds.has(r.nodeId);
    const isBasket = !isSel && !isHov && !isSource && basket.includes(tag);

    let fill, stroke, sw;
    if      (isSel)    { fill = 'rgba(40,160,94,0.25)';  stroke = 'rgb(30,116,68)';        sw = 0.28; }
    else if (isHov)    { fill = 'rgba(40,160,94,0.15)';  stroke = 'rgb(40,160,94)';        sw = 0.22; }
    else if (isSource) { fill = 'rgba(168,85,247,0.18)'; stroke = 'rgb(147,51,234)';       sw = 0.24; }
    else if (isBasket) { fill = 'rgba(59,130,246,0.08)'; stroke = 'rgba(59,130,246,0.55)'; sw = 0.14; }
    else               { fill = 'transparent';            stroke = 'rgba(40,160,94,0.5)';   sw = 0.10; }

    // pointer-events is explicit rather than relying on fill="transparent" being
    // hit-testable -- some rendering paths don't treat a fully-transparent fill
    // as "painted" for real pointer input, even though it's not fill="none".
    return `<rect data-tag="${esc(tag)}" data-nid="${esc(r.nodeId)}" x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" style="cursor:pointer;pointer-events:all"><title>${esc(r.tag)}</title></rect>`;
  }).join('');

  svg.querySelectorAll('rect[data-tag]').forEach(rect => {
    const tag = rect.dataset.tag;
    const nid = rect.dataset.nid;
    // Hover must NOT rebuild the SVG (renderOverlay() replaces every <rect>,
    // including the one the pointer is currently over) — a real click is a
    // pointerenter → mousedown → mouseup → click sequence, and browsers drop
    // the click if its target was removed from the DOM in between. Restyle
    // the existing elements in place instead.
    rect.addEventListener('pointerenter', () => { S.hovNodeId = nid; S.hovTag = tag; refreshTagChips(); renderTreePanel(); renderAnchorStrip(); updateOverlayStyles(); });
    rect.addEventListener('pointerleave', () => { S.hovNodeId = null; S.hovTag = null; refreshTagChips(); renderTreePanel(); renderAnchorStrip(); updateOverlayStyles(); });
    rect.addEventListener('click', () => {
      // toggle selNodeId; always set selTag (matches React: toggleSelectedDgmlNodeId + setSelectedTagName)
      S.selNodeId = S.selNodeId === nid ? null : nid;
      S.selTag = tag;
      if (S.selNodeId) expandAncestorsOf(S.selNodeId);
      refreshTagChips(); renderTreePanel(); renderAnchorStrip(); renderOverlay();
      const treeBtn = document.querySelector(`[data-tree-id="${CSS.escape(nid)}"]`);
      treeBtn?.scrollIntoView({ block: 'nearest' });
    });
  });
}

function updateOverlayStyles() {
  const svg = document.getElementById('pg-svg');
  if (!svg) return;
  const { selTag, selNodeId, hovTag, hovNodeId, basket } = S;
  const computedInfo = selNodeId ? _computedMap.get(selNodeId) : null;
  const sourceNodeIds = computedInfo ? new Set(computedInfo.hrefTargets) : null;
  svg.querySelectorAll('rect[data-tag]').forEach(rect => {
    const tag = rect.dataset.tag;
    const nid = rect.dataset.nid;
    const isSel = (!!selNodeId && nid === selNodeId) || (!!selTag && tag === selTag);
    const isHov = !isSel && ((!!hovNodeId && nid === hovNodeId) || (!!hovTag && tag === hovTag));
    const isSource = !isSel && !isHov && !!sourceNodeIds && sourceNodeIds.has(nid);
    const isBasket = !isSel && !isHov && !isSource && basket.includes(tag);
    let fill, stroke, sw;
    if      (isSel)    { fill = 'rgba(40,160,94,0.25)';  stroke = 'rgb(30,116,68)';        sw = 0.28; }
    else if (isHov)    { fill = 'rgba(40,160,94,0.15)';  stroke = 'rgb(40,160,94)';        sw = 0.22; }
    else if (isSource) { fill = 'rgba(168,85,247,0.18)'; stroke = 'rgb(147,51,234)';       sw = 0.24; }
    else if (isBasket) { fill = 'rgba(59,130,246,0.08)'; stroke = 'rgba(59,130,246,0.55)'; sw = 0.14; }
    else               { fill = 'transparent';            stroke = 'rgba(40,160,94,0.5)';   sw = 0.10; }
    rect.setAttribute('fill', fill);
    rect.setAttribute('stroke', stroke);
    rect.setAttribute('stroke-width', sw);
  });
}

// ═══════════════════════════════════════════════════════════════════
// TAG METRICS  (full port of tagMetrics.ts)
// ═══════════════════════════════════════════════════════════════════
function stripNs(tag) { const c = tag.indexOf(':'); return c >= 0 ? tag.slice(c + 1) : tag; }
function countWords(t) { const s = (t || '').trim(); return s ? s.split(/\s+/).length : 0; }
function shannonH(freq) {
  const tot = [...freq.values()].reduce((a, b) => a + b, 0);
  if (!tot) return 0;
  let h = 0; for (const c of freq.values()) { const p = c / tot; if (p > 0) h -= p * Math.log2(p); } return h;
}

function computeTagMetrics(xmlStr) {
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');
  if (doc.querySelector('parsererror')) return [];
  const allEls = [...doc.getElementsByTagName('*')];
  const N = allEls.length; if (!N) return [];
  const rootTag = doc.documentElement.tagName;

  // BFS depths
  const elDepth = new Map(); elDepth.set(doc.documentElement, 0);
  const q = [doc.documentElement];
  while (q.length) { const el = q.shift(); const d = elDepth.get(el); for (let i = 0; i < el.children.length; i++) { const c = el.children[i]; elDepth.set(c, d + 1); q.push(c); } }

  // Post-order subtree sizes
  const dfs = []; const stk = [doc.documentElement];
  while (stk.length) { const el = stk.pop(); dfs.push(el); for (let i = el.children.length - 1; i >= 0; i--) stk.push(el.children[i]); }
  const sz = new Map(), descTags = new Map();
  for (let i = dfs.length - 1; i >= 0; i--) {
    const el = dfs[i]; let s = 1; const dt = new Set();
    for (let j = 0; j < el.children.length; j++) { const c = el.children[j]; s += sz.get(c) || 1; dt.add(c.tagName); const cdt = descTags.get(c); if (cdt) for (const t of cdt) dt.add(t); }
    sz.set(el, s); descTags.set(el, dt);
  }

  // Per-element data
  const elData = new Map(), tagTot = new Map(), tagNoChild = new Map(), allTagNames = new Set();
  for (const el of allEls) {
    allTagNames.add(el.tagName);
    tagTot.set(el.tagName, (tagTot.get(el.tagName) || 0) + 1);
    if (!el.children.length) tagNoChild.set(el.tagName, (tagNoChild.get(el.tagName) || 0) + 1);
    let directText = false;
    for (let i = 0; i < el.childNodes.length; i++) { if (el.childNodes[i].nodeType === 3 && (el.childNodes[i].textContent || '').trim()) { directText = true; break; } }
    const ctf = new Map();
    for (let i = 0; i < el.children.length; i++) { const t = el.children[i].tagName; ctf.set(t, (ctf.get(t) || 0) + 1); }
    elData.set(el, { depth: elDepth.get(el) || 0, sz: sz.get(el) || 1, tokens: countWords(el.textContent || ''), directText, ctf, dt: descTags.get(el) || new Set() });
  }

  const leafTypes = new Set();
  for (const [tag, tot] of tagTot) if ((tagNoChild.get(tag) || 0) / tot > 0.7) leafTypes.add(tag);
  const totalTypes = allTagNames.size;

  const groups = new Map();
  for (const el of allEls) {
    if (el.tagName === rootTag) continue;
    if (!groups.has(el.tagName)) groups.set(el.tagName, []);
    groups.get(el.tagName).push(el);
  }

  const results = [];
  for (const [fullName, instances] of groups) {
    const count = instances.length;
    let sD = 0, sSt = 0, sBr = 0, sDT = 0, sHC = 0, sBetw = 0, sEnt = 0;
    const allDT = new Set();
    for (const el of instances) {
      const d = elData.get(el);
      sD += d.depth; sSt += d.tokens; sBr += d.ctf.size;
      if (d.directText) sDT++; if (el.children.length) sHC++;
      const denom = N * (N - 1) / 2;
      sBetw += denom > 0 ? (d.sz * (N - d.sz)) / denom : 0;
      sEnt += shannonH(d.ctf);
      for (const t of d.dt) allDT.add(t);
    }
    const depthMean = sD / count, stMean = sSt / count, branchMean = sBr / count;
    const textRatio = sDT / count, childRatio = sHC / count;
    const density = stMean / Math.max(1, depthMean);
    const betweenness = sBetw / count, entropy = sEnt / count;
    let leafCnt = 0; for (const t of allDT) if (leafTypes.has(t)) leafCnt++;
    const ancCov = allDT.size / Math.max(1, totalTypes - 1);
    let role;
    if (textRatio >= 0.7 && childRatio < 0.3) role = 'leaf-value';
    else if (childRatio >= 0.7 && textRatio < 0.3) role = 'container';
    else if (textRatio >= 0.3 || childRatio >= 0.3) role = 'hybrid';
    else role = 'mixed';
    results.push({ name: stripNs(fullName), fullName, count, depthMean, stMean, branchMean, textRatio, childRatio, density, leafCnt, ancCov, betweenness, entropy, role });
  }
  return results;
}

// ═══════════════════════════════════════════════════════════════════
// ALGO FILTERS
// ═══════════════════════════════════════════════════════════════════
function applyAlgoFilter(metrics, filter) {
  const n = metrics.length; if (!n) return metrics;
  const half = Math.ceil(n / 2);
  if (filter === 'Values') return metrics.filter(m => m.role === 'leaf-value' || (m.textRatio >= 0.5 && m.childRatio < 0.3));
  if (filter === 'Sections') {
    const nonLeaf = metrics.filter(m => m.role !== 'leaf-value');
    const byBetw = new Set([...nonLeaf].sort((a, b) => b.betweenness - a.betweenness).slice(0, half));
    const byAncCov = new Set([...nonLeaf].sort((a, b) => b.ancCov - a.ancCov).slice(0, half));
    return nonLeaf.filter(m => byBetw.has(m) || byAncCov.has(m));
  }
  if (filter === 'Density') {
    const byD = new Set([...metrics].sort((a, b) => b.density - a.density).slice(0, half));
    const byB = new Set([...metrics].sort((a, b) => b.branchMean - a.branchMean).slice(0, half));
    const byL = new Set([...metrics].sort((a, b) => b.leafCnt - a.leafCnt).slice(0, half));
    return metrics.filter(m => byD.has(m) || byB.has(m) || byL.has(m));
  }
  if (filter === 'Patterns') return [...metrics].sort((a, b) => b.entropy - a.entropy).slice(0, half);
  return metrics;
}

function getFilteredMetrics() {
  let r = _metrics;
  if (S.tagSearch.trim()) {
    if (S.describeResults !== null) { const s = new Set(S.describeResults); r = r.filter(m => s.has(m.name)); }
    else { const q = S.tagSearch.toLowerCase(); r = r.filter(m => m.name.toLowerCase().includes(q)); }
  }
  if (S.tagFilter === 'All') return r;
  if (SEMANTIC_FILTERS.includes(S.tagFilter)) return r.filter(m => S.semanticMap[m.name] === S.tagFilter);
  if (ALGO_FILTERS.includes(S.tagFilter)) return applyAlgoFilter(r, S.tagFilter);
  return r;
}

// ═══════════════════════════════════════════════════════════════════
// LLM API
// ═══════════════════════════════════════════════════════════════════
function isGemini(m) { return m.toLowerCase().startsWith('gemini/') || m.toLowerCase().startsWith('google/'); }
function isOpenAI(m) { return m.toLowerCase().startsWith('openai/'); }

async function llmFetch(userPrompt, systemPrompt) {
  const { model, apiKey } = S.llm;
  if (!apiKey) throw new Error('No API key — configure one in LLM settings.');
  if (isGemini(model)) {
    const modelId = model.split('/').pop();
    const body = { contents: [{ role: 'user', parts: [{ text: userPrompt }] }] };
    if (systemPrompt) body.systemInstruction = { parts: [{ text: systemPrompt }] };
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${encodeURIComponent(apiKey)}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!r.ok) throw new Error(`Gemini ${r.status}`);
    return r.json();
  } else if (isOpenAI(model)) {
    const modelId = model.split('/').pop();
    const msgs = systemPrompt ? [{ role: 'system', content: systemPrompt }] : [];
    msgs.push({ role: 'user', content: userPrompt });
    const r = await fetch('https://api.openai.com/v1/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, body: JSON.stringify({ model: modelId, messages: msgs, max_tokens: 1024 }) });
    if (!r.ok) throw new Error(`OpenAI ${r.status}`);
    return r.json();
  } else {
    const r = await fetch('https://api.anthropic.com/v1/messages', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' }, body: JSON.stringify({ model, max_tokens: 1024, system: systemPrompt || undefined, messages: [{ role: 'user', content: userPrompt }] }) });
    if (!r.ok) throw new Error(`Anthropic ${r.status}`);
    return r.json();
  }
}

function extractText(d) {
  return d?.content?.[0]?.text || d?.choices?.[0]?.message?.content || d?.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function runSemanticClassification() {
  if (!_metrics.length) return;
  S.semanticError = null;
  if (!S.llm.apiKey) return;
  S.semanticLoading = true; refreshFilterBtns();
  const names = _metrics.map(m => m.name).join(', ');
  try {
    const data = await llmFetch(`You are analyzing XML tag names from a semantic document (could be any domain: legal, medical, financial, technical, etc.).\n\nClassify each tag name below into exactly one of these categories, or null if none fits:\nWho / What? | When? | Amounts | Defined as? | Rules & Conditions\n\nTag names: ${names}\n\nRespond with ONLY a valid JSON object mapping each tag name to its category string or null.`);
    const text = extractText(data).replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/i, '').trim();
    try { S.semanticMap = JSON.parse(text); } catch { S.semanticError = 'Could not parse the classification response.'; }
  } catch (e) { S.semanticError = e.message || 'Classification request failed.'; }
  S.semanticLoading = false; refreshFilterBtns(); refreshTagChips();
}

async function runDescribeSearch(q) {
  if (!S.llm.apiKey || !q.trim() || !_metrics.length) { S.describeResults = null; S.describeLoading = false; refreshTagChips(); return; }
  try {
    const data = await llmFetch(`From this list of XML tag names, return the ones that best match the description: "${q}"\n\nTag names: ${_metrics.map(m => m.name).join(', ')}\n\nRespond with ONLY a valid JSON array of matching tag names. Return [] if nothing matches.`);
    const text = extractText(data).replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/i, '').trim();
    try { const arr = JSON.parse(text); S.describeResults = Array.isArray(arr) ? arr : null; } catch { S.describeResults = null; }
  } catch { S.describeResults = null; }
  S.describeLoading = false; refreshTagChips();
}

async function _post(path, body) {
  try {

    return await res.json(); // server always answers {ok, data|error}
  } catch (e) {
    return { ok: false, error: 'Cannot reach server: ' + e.message };
  }
}
