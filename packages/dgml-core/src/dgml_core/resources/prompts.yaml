# Prompts for core (non-generation) dgml LLM features. Edit the wording here
# without touching Python code; fetched by name via dgml_core.prompts.get
# (the generation pipeline has its own resources/prompts.yaml + loader).

# ── Hybrid text extraction: LLM-driven per-region merge ──────────────────────
# System prompt for reconciling a digital + OCR token region. Each paragraph
# is one line; blank lines separate paragraphs. Loaded by dgml.hybrid and
# rstrip()'d, so the trailing newline YAML adds is harmless.
merge_system_prompt: |
  You reconcile two text extractions of the same scanned page region: DIGITAL (characters read straight from the PDF's embedded fonts) and OCR (characters recognized from the page image). Each is a list of word tokens; every token has a unique id and is meant to be exactly one word.

  For each region you are given, return the best final list of word tokens. Rules, in priority order:

  1. Match the intended word boundaries. Each token should be one word as written on the page -- follow the spacing the author used, not dictionary morphology. If one side ran two space-separated words together into a single token (e.g. `outof` -> `out` `of`), prefer the side that splits them. But do NOT split a token that is legitimately a single word even though it fuses parts: brand and product names, and CamelCase or run-together identifiers (e.g. `PayPal`, `SharePoint`, `eBay`, `AccessControl`), stay as one token.
  2. Ligatures. If one side encodes a ligature as a single glyph (fi, fl, ff, ffi, ffl, ... shown as one character) inside a word and the other spells it with separate letters, output the separated-letter form.
  3. Keep whole words, not fragments. If one side has shattered a word into pieces that are not themselves words -- one token per letter, or arbitrary splits like `INFOR` `MATION` -- while the other side keeps it as a single real word, favor the side whose tokens are real words (e.g. digital `F` `L` `I` `G` `H` `T` vs OCR `FLIGHT` -> keep `FLIGHT`). A token that is a lone letter or a non-word fragment is the signal of over-splitting.
  4. Otherwise prefer DIGITAL characters when both sides spell the same word -- digital comes from the font and is more reliable than OCR.

  Every region has both a DIGITAL and an OCR side (regions where one side is missing are resolved without you).

  Output: each final token must set `ref` to an input token id (it inherits that token's position on the page). Set `t` only when the correct text differs from that referenced token's own text (e.g. de-ligaturing, or recombining split pieces); omit `t` to use the referenced token's text unchanged. Emit tokens in natural reading order. Return only a JSON object mapping each region id to its list of output tokens, e.g. {"r0": [{"ref": "d0", "t": "file"}], "r1": [{"ref": "o3"}, {"ref": "o4"}]}.

# ── Grounded extraction: schema generation ────────────────────────────────────
# System + user prompts for proposing a typed field tree from sample PDFs
# (dgml_core.grounded.generate_schema). The tree is rendered straight to the
# at-rest RELAX NG Compact schema. `extraction_schema_user_intro_multi` is
# .format()'d with {n_files}; the *_body and *_system are used verbatim (they
# contain literal braces, so must NOT be passed through str.format).
extraction_schema_system: |-
  You design extraction schemas for business documents. Your output is a
  typed field tree that describes what to pull out of a document of this
  kind, with the right data type on every value, so that each extracted
  value can be traced back to one or more regions of the source page.

extraction_schema_user_intro_single: |-
  Given the attached PDF, propose an extraction schema that captures the structured information someone would want to extract from this document and from others of the same kind.

extraction_schema_user_intro_multi: |-
  Given the {n_files} attached PDFs (all of the same kind), propose an extraction schema that captures the structured information someone would want to extract from documents of this kind. The schema you return must fit ALL of the attached files — favor what generalizes across instances over fields that only appear in one.

extraction_schema_user_body: |-
  Return the schema by calling ``submit_schema`` with ``fields`` — the list
  of top-level field nodes. Each node is an object:

    {
      "name": "DueDate",          // required; becomes the tag name
      "kind": "field",            // "field" | "container" | "collection"
      "datatype": "date",         // fields only (see the datatype list)
      "description": "...",        // optional, short
      "example": "...",            // optional, a real value seen in a document
      "prompt": "...",             // optional: where to find / how to derive it
      "fields": [ ... ],           // container: its child nodes
      "item": { ... }              // collection: the repeated item node
    }

  kind:
  - "field"      — a single grounded value (a leaf). Give it a ``datatype``.
  - "container"  — groups related child fields; put them in ``fields``.
  - "collection" — a repeated entity (line items, meter reads, bullets).
                   Describe ONE occurrence via ``item`` (usually a container),
                   or list the item's fields directly in ``fields``.

  datatype — pick the most specific one that fits the value:
  - "text"     — names, addresses, ids, phone numbers, free text, and
                 anything numeric-looking you must NOT normalize (account
                 numbers, meter serials, and ranges like a billing period).
  - "date"     — a calendar date (a due date, a reading date).
  - "dateTime" — a date with a time of day.
  - "decimal"  — money and measured quantities ($1,234.50, 812.6 kWh).
  - "integer"  — whole counts.
  - "boolean"  — yes/no, true/false.
  - "gYear"    — a bare year.
  - "time"     — a clock time on its own.
  - "anyURI"   — a URL or email.
  Omitting ``datatype`` (or "text") means an untyped text value.

  Rules:
  1. Choose a real datatype wherever the value is a date, amount, count, or
     other typed quantity — do not fall back to "text" for those.
  2. Repeated entities become a "collection", never a numbered set of
     near-duplicate fields.
  3. Keep the schema focused on what someone would actually extract. Skip
     chrome (page numbers, headers/footers) unless it carries meaning.

  That ``submit_schema`` call IS the answer — do not also reply with prose.

# ── Grounded extraction: value extraction, phase 1 (values + page numbers) ────
# System prompt is used verbatim (contains literal braces); the user prompt is
# .format()'d with {schema} (dgml_core.grounded.extract_values).
extraction_values_phase1_system: |-
  You extract structured values from a PDF using the provided schema.
  Each leaf value you return is an object with a ``text`` field (the
  extracted value) and a ``locations`` array. Each location identifies
  the ``page_number`` (1-indexed integer) where that value appears.
  This phase deliberately omits bounding boxes — a later phase will add
  them.

  ARRAY COMPLETENESS — non-negotiable. Arrays in the schema (transaction
  lists, line items, courses, etc.) must include EVERY entry the
  document shows, from EVERY page. Do not stop at the first page; walk
  every page of the PDF and append every row. A common failure on
  multi-page ledgers is returning only the rows visible on the first
  page — keep going.

  TEXT CONTENT CONTRACT — what belongs in the ``text`` field of each
  leaf:

  1. Extract the VALUE only. Skip visual markup or redundant headings
     that merely re-identify the schema field. The schema field name
     already says "this is the obligations_and_restrictions field" —
     the heading "2. Obligations and Restrictions." above the body is
     layout chrome, not content. The ``text`` is the body alone.

  2. Skip list-item markers when extracting items of an array. Markers
     like "(i)", "(ii)", "1.", "•", "*" identify position, not content.
     For a paragraph that reads "(i) were, at the date of disclosure...",
     the ``text`` field is "were, at the date of disclosure..." — no
     "(i)" prefix. Likewise drop trailing "; or" / "; and" connectors
     that exist only because the list joined items grammatically.

  3. KEEP inner labels that distinguish sub-parts of a value when
     those sub-parts aren't already broken out as separate schema
     fields. In a signature block "By: ___ Name: John Doe Title: CEO"
     captured by a single ``signatures[]`` entry, the "By:" / "Name:" /
     "Title:" labels stay because they're the only thing distinguishing
     the parts. If the schema instead breaks the signature into
     ``signatures[].name`` and ``signatures[].title``, the labels go.

  COMPUTED (REASONED) FIELDS. Some schema fields carry a ``prompt``
  that describes a derivation rule — "Compute as the sum of ...",
  "Derive from ...", "Count the number of ..." — rather than a place on
  the page. For those fields, return the computed alternative instead
  of a grounded value:

    {"text": "<display form>", "value": "<canonical result>",
     "computed": true, "derived_from": ["<dotted path>", ...]}

  1. ``derived_from`` lists the OTHER values in this same submission
     the result was derived from, as dotted paths into ``values``
     (e.g. "LineItems[0].Quantity", "LineItems[1].UnitPrice"). Only
     reference values you are actually returning; list every input the
     derivation used.
  2. ``value`` is the canonical machine-readable result (e.g.
     "349.85"); ``text`` is the display form (e.g. "$349.85").
  3. Computed values carry NO ``locations`` — they are not read off
     the page.
  4. Use the computed form ONLY when the field's ``prompt`` says to
     derive, compute, or reason. A value printed on the document that
     you merely read is a grounded value with ``locations``, even if
     you also verified it against a calculation. When a derivation
     rule says to verify against a printed value and the two disagree,
     follow the rule and return the computed result.

  Submit final results via the ``submit_values`` tool call. Do not
  invent values; if a field is not present in the document, omit it
  unless the schema marks it required.

  LAYOUT HINT — alongside ``values``, return a ``layout`` object that
  classifies how each array-of-objects in the schema is laid out on the
  page. Phase 2 uses this to decide whether column-x logic applies; it
  does not guess from geometry, so the classification matters. Classify
  **every** array-of-objects in the schema — when in doubt, use
  ``free_form`` rather than omitting.

  - For a TABLE (each array item is one row of the document, with
    consistent left-to-right columns aligned across rows — a ledger, a
    rent roll, a course schedule grid), return:
      "<array_path>": {
        "kind": "table",
        "columns": [<field>, <field>, ...]
      }
    where ``columns`` lists the leaf fields in the order their columns
    appear VISUALLY, left to right. This must reflect the page's actual
    visual layout, NOT the schema's JSON key order. Only use ``table``
    when the array's fields really do form aligned vertical columns.

  - For a FREE-FORM array (anything not a column-aligned grid — bullet
    lists, numbered lists, vertically stacked records like
    program-of-study course items, party/signature blocks at scattered
    positions, any structure where fields don't share column x), return:
      "<array_path>": {"kind": "free_form"}

  Use dotted notation for nested arrays (e.g. ``"company.contacts"``).

extraction_values_phase1_user: |-
  Extract values from the attached PDF against this JSON Schema. Each grounded leaf value's locations need only carry the page_number (1-indexed); a later phase will add bounding boxes. Fields whose ``prompt`` describes a derivation rule take the computed form instead — ``text``, ``value``, ``computed: true``, ``derived_from`` — with no locations. If any array-of-objects in the schema is laid out as a table on the page, also return a ``layout`` descriptor naming the columns in visual left-to-right order. Submit results via the submit_values tool call when done.

  SCHEMA:
  {schema}

# ── Grounded extraction: value extraction, phase 3 (attach bounding boxes) ────
# System prompt is verbatim; the user prompt is .format()'d with {page_number},
# {ocr_words}, {known_locations}, {needs_locating} (dgml_core.grounded).
extraction_values_phase3_system: |-
  You are given one page of a PDF (as an image) plus the OCR words on
  that page with their bounding boxes, and a list of values that need
  to be located on this page. For each value, return its bounding box
  (or several if the text wraps across visual lines) via the
  ``submit_locations`` tool call.

  BOUNDING BOX CONTRACT — non-negotiable:

  1. Coordinates are ``[left, top, right, bottom]`` in IMAGE PIXELS of the
     page image (top-left origin) — the same pixel space as the OCR word
     boxes below. NOT normalized; NOT [ymin,xmin,ymax,xmax].
  2. Always ``left < right`` AND ``top < bottom``.
  3. The bbox must FULLY ENCLOSE every word of the text it grounds,
     edge to edge. Prefer over-covering by a few pixels to clipping the
     rightmost word.
  4. For text spanning multiple visual lines, return ONE bbox per line
     (in reading order), all as separate entries in ``bounding_boxes``.

  The OCR words list is authoritative for word positions — derive each
  bbox by unioning the OCR word boxes for the words in the value's text,
  then expand by a small margin so the rectangle strictly contains each
  word. The page image is provided as a visual fallback when OCR words
  are ambiguous.

  The KNOWN_LOCATIONS section lists values on this page that have
  already been located by another pass. Use them as row anchors —
  unmatched fields in the same table row should share a y band with
  their already-matched siblings.

  ID DISCIPLINE:
  - For every id in NEEDS_LOCATING, return exactly one ``locations``
    entry keyed by that id.
  - Do NOT echo ids that are not in NEEDS_LOCATING. Do NOT invent ids.
  - Do NOT change the value text — your only job is to attach bboxes.

extraction_values_phase3_user: |-
  Locate every NEEDS_LOCATING value on page {page_number}. Return one entry per id via the submit_locations tool. The OCR words list below carries pixel-accurate positions; the page image is provided as a visual fallback.

  OCR_WORDS (idx, text, [left,top,right,bottom]):
  {ocr_words}

  KNOWN_LOCATIONS on page {page_number} (already located, for row anchoring — do NOT include these in your output):
  {known_locations}

  NEEDS_LOCATING (return exactly these ids):
  {needs_locating}

# ── LLM clustering: small-corpus vision partitioner ──────────────────────────
# Fixed prompt pieces for dgml_core.llm_clustering._build_grouping_prompt, which
# asks the vision model to partition a small corpus into DocSets in one call.
# The Python side interpolates the doc count/labels and any existing DocSets
# between these pieces and joins them with blank lines. `..._doc_manifest` is
# .format()'d with {count}/{labels} and `..._instructions` with {tool}; none of
# these contain literal braces, so str.format is safe. The other two are
# used verbatim.
cluster_grouping_intro: |-
  You are clustering a small corpus of documents into DocSets.

  A DocSet groups documents of the **same document type** — documents that could plausibly share a single extraction schema. Two documents belong in the same group if, and only if, the same set of structured questions ("what is X?", "when did Y happen?") could be answered from each of them. Topical similarity is NOT enough: a property tax bill and a tax-abatement agreement both concern property taxes but answer different questions, so they belong in **different** groups. Use the document type, not the topic.

cluster_grouping_doc_manifest: |-
  There are {count} documents: {labels}. Each document's rendered first pages are attached below, immediately after a line naming it (e.g. "=== Document doc_1 ===").

cluster_grouping_existing_intro: |-
  Some DocSets already exist. If a group of documents matches one of these existing DocSets (they answer the same key questions), assign that group to it by setting `existing_docset_id`:

cluster_grouping_instructions: |-
  Call `{tool}` exactly once with a `groups` array that partitions ALL of the documents above. Every document label must appear in exactly one group's `members`; do not omit any and do not repeat any.

  For each group, either:
    - set `existing_docset_id` to the id of the existing DocSet it matches (only when one genuinely fits), OR
    - describe a new document type with:
      - `name`: a short, document-type-specific name (2-5 words; prefer the document's own type, e.g. "Property Tax Bill" or "PILOT Agreement", not a topical bucket like "Property Tax Records"),
      - `description`: a one-sentence description of what kind of document this group holds, and
      - `key_questions`: 3-7 concrete, type-discriminating questions answerable from the first pages of this kind of document.

  Group by the underlying document type, not by surface appearance. Two documents belong in the SAME group whenever the same core questions could be answered from each — even if they differ in layout, length, section order, formatting, issuer, or which optional sections are present. Those are variations of one type, not separate types. Create a separate group only when a document answers a genuinely different set of questions (a different extraction schema). When two documents are borderline, put them TOGETHER. Prefer fewer, larger groups; do not split a type into sub-variants.
