[project]
name = "dgml-clustering"
version = "0.1.1"
description = "Cluster DGML files into DocSets via multimodal embeddings."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Docugami" }]
readme = "../../README.md"
dependencies = [
    "omegaconf>=2.3",
    "pillow>=10",
    "pydantic>=2.6",
    "torch>=2.6,<2.7",
    "numpy>=2.0",
    "pandas>=2.2",
    "pyarrow>=15",
    "scipy>=1.12",
    "scikit-learn>=1.4",
    "networkx>=3.2",
    "geoopt>=0.5",
    # transformers 5.x is required to correctly load the Qwen3-VL-Embedding
    # checkpoints (the 4.x AutoModel resolves the bare Qwen3VLModel backbone
    # and silently random-inits the `model.`-prefixed weights).
    "transformers>=5,<6",
    "sentence-transformers>=5.6",
    "accelerate>=0.30",
    "timm>=1.0",
]

[project.optional-dependencies]
logging = [
    "clearml>=1.16",
    "wandb>=0.17",
]
# Powers `reduce_method: umap` in the clustering scenarios (the default
# `light`/`medium`/`heavy` presets use it). Gated behind `try: import umap`
# at runtime, so it's an opt-in extra rather than a core dep — but the
# documented install path pulls it (see dgml-core `[clustering]`). The
# `numba>=0.61` floor is load-bearing: older numba "accepts" numpy 2 via
# loose metadata but crashes at import; 0.61 is the first that builds against
# numpy 2. Pulls numba / llvmlite / pynndescent (all BSD).
umap = [
    "umap-learn>=0.5.6",
    "numba>=0.61",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/clustering"]
