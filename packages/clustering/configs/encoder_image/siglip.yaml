# @package encoder_image
# SigLIP vision encoder (sigmoid-loss CLIP; Zhai et al. 2023).
# Select with:  encoder_image=siglip
name: siglip
# embedding_dim MUST match the checkpoint's vision hidden size:
#   google/siglip-base-patch16-224    -> 768
#   google/siglip-large-patch16-256   -> 1024
#   google/siglip-so400m-patch14-384  -> 1152
model_id: google/siglip-so400m-patch14-384
embedding_dim: 1152
# Set true to additionally emit per-patch tokens for fusion=late_interaction.
# SigLIP's fixed input resolution makes the patch grid uniform across images.
multi_vector: false
