# @package encoder_image
# Qwen-VL vision-tower encoder (Qwen2.5-VL / Qwen2-VL).
# Select with:  encoder_image=qwen_vl
name: qwen_vl
# embedding_dim MUST match the checkpoint's fused hidden size (out_hidden_size
# of the visual merger):
#   Qwen/Qwen2.5-VL-3B-Instruct  -> 2048
#   Qwen/Qwen2.5-VL-7B-Instruct  -> 3584
model_id: Qwen/Qwen2.5-VL-3B-Instruct
embedding_dim: 2048
# Single-vector only: dynamic-resolution token grids are ragged, so
# multi_vector=true is rejected.
multi_vector: false
