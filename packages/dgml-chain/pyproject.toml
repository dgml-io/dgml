[project]
name = "dgml-chain"
version = "0.1.1"
description = "Direct EVM-chain anchoring for DGML artifacts (NVNM Chain and compatible chains)."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Docugami" }]
readme = "../../README.md"
# eth-account (signing) and eth-abi (calldata encode/decode) are both MIT and
# pull a permissive transitive tree (eth-utils, eth-hash, rlp, pycryptodome,
# …). All chain transport is stdlib JSON-RPC over urllib — no web3.py, no new
# HTTP dep. keyring holds the signing key out of process and off the disk.
dependencies = [
    "eth-account>=0.13",
    "eth-abi>=5.0",
    "keyring>=25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dgml_chain"]
