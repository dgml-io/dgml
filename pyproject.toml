[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.6",
    "mypy>=1.11",
    "pip-licenses>=4.4",
    # Cloud SDKs are runtime-optional extras of `dgml`, but we install them
    # in dev so mypy / tests can see the modules. Tests stub the network.
    "boto3>=1.34",
    "azure-ai-documentintelligence>=1.0",
    "azure-identity>=1.15",
    # PyObjC (the `dgml[macos]` extra) is macOS-only — gated to darwin so it
    # installs in dev there (Apple Vision tests run) and is skipped on
    # Linux/Windows CI (those tests skip).
    "pyobjc-framework-Vision>=10.0 ; sys_platform == 'darwin'",
    "pyobjc-framework-Quartz>=10.0 ; sys_platform == 'darwin'",
    # Type stubs for PyYAML (the runtime dep moved to `dgml` core).
    "types-PyYAML>=6.0",
    # Type stubs (typeshed, Apache-2.0) so mypy can check the translators-pdf
    # xlsx path (openpyxl/reportlab) and the clustering graph code (networkx).
    "types-openpyxl>=3.1",
    "types-reportlab>=4.0",
    "types-networkx>=3.2",
    "dateparser>=1.2",
    "einops>=0.8.2",
    # Powers `--reduce-method umap` in the clustering scenarios. Optional at
    # runtime (gated behind `try: import umap`), so it lives in dev rather than
    # in clustering's core deps. Pulls in
    # numba / llvmlite / pynndescent (all BSD). The numba floor is load-
    # bearing: without it the resolver picks an ancient numba whose loose
    # metadata "accepts" numpy 2 but crashes at import. numba >=0.61 is the
    # first line that builds against numpy 2 (and caps numpy <2.5, steering
    # the shared venv to a numpy numba can actually run under).
    "umap-learn>=0.5.6",
    "numba>=0.61",
    "networkx>=3.6.1",
]

# Evaluation-only dependencies (evaluation/dgml/evaluate.py). Not part of the
# default sync, the dgml runtime, or the shipped wheel — install on demand:
#   uv sync --group eval
# The en_core_web_lg spaCy model is not a PyPI package; evaluate.py downloads
# it lazily on first run (~750 MB).
[dependency-groups]
eval = [
    "spacy>=3.7",
    "numpy>=2.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "ANN", "RUF"]
# N818: don't force "Error" suffix on exception classes — stable error code
# strings are the contract, not class names.
# ANN401: Any is legitimate in JSON I/O helpers.
# RUF005: list-concat with `+` is readable and common in argparse-style tests.
ignore = ["N818", "ANN401", "RUF005"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["ANN"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
# Each package owns a `tests/` dir; with two of them (dgml, dgml-core) carrying
# a `conftest.py`, the default flat module resolution collides ("Duplicate
# module named tests/conftest"). explicit_package_bases + namespace_packages
# makes mypy derive a distinct, path-qualified module name per file.
explicit_package_bases = true
namespace_packages = true
mypy_path = "packages/dgml/src:packages/dgml-core/src:packages/dgml-chain/src:packages/translators-pdf/src:packages/clustering/src"

[[tool.mypy.overrides]]
module = [
    "pdfminer.*",
    "boto3.*",
    "botocore.*",
    "sklearn.*",
    "scipy.*",
    "igraph.*",
    "leidenalg.*",
    "umap.*",
    "geoopt.*",
    # Aspose.Words is a proprietary commercial library and ships no type
    # stubs; it's an optional converter backend imported lazily.
    "aspose",
    "aspose.*",
    # PyObjC framework bindings ship no type stubs.
    "Vision.*",
    "Quartz.*",
    "Foundation.*",
    "objc.*",
    # eth-account / eth-abi / eth-utils and keyring ship no (or partial) type
    # stubs; the dgml-chain package wraps them behind typed public functions.
    "eth_account.*",
    "eth_abi.*",
    "eth_utils.*",
    "eth_keys.*",
    "keyring.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["packages/*/tests"]
# importlib mode derives a unique, rootdir-relative module name per test file
# (e.g. packages.dgml.tests.test_cli vs packages.dgml-core.tests.test_hybrid),
# so the CLI (`dgml`) and library (`dgml-core`) test packages can each carry
# their own `conftest.py` without the "tests.conftest" name clash that prepend
# mode would raise.
addopts = "-ra --strict-markers --import-mode=importlib"
consider_namespace_packages = true
